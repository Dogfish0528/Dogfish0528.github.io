<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogfish Arcade | 終極遊戲大廳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1db954; --accent: #ff1744; --game-blue: #00d4ff; --game-yellow: #ffb300; font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; --font-pixel: 'Press Start 2P', cursive; }
    body { background: radial-gradient(circle at top, #1a0b12, #050505); background-attachment: fixed; color: #fff; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    * { font-family: var(--font-main) !important; box-sizing: border-box; }
    a, button, input, select { outline: none; }
    ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    
    .navbar { height: 60px; background: rgba(10,10,10,0.95); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; flex-shrink: 0; }
    .logo { font-size: 1.2em; font-weight: 900; background: linear-gradient(90deg, #ff1744, #ffb300); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-home { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #555; padding: 6px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.2s; font-size: 0.9em; cursor:pointer;} .btn-home:hover { background: #fff; color: #000; }

    .lobby-container { display: flex; flex: 1; overflow: hidden; position: relative; }
    .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; flex-shrink: 0; z-index: 100; transition: left 0.3s ease; }
    .player-profile { padding: 0 20px 15px; border-bottom: 1px solid #333; margin-bottom: 10px; text-align: center; }
    .player-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; color: #000; }
    .menu-section { padding: 5px 20px; color: #555; font-size: 0.8em; font-weight: bold; margin-top: 10px; }
    .menu-item { padding: 10px 20px; color: #aaa; font-weight: bold; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; font-size:0.9em;}
    .menu-item:hover { background: #1a1a1a; color: #fff; } .menu-item.active { background: #222; color: #00d4ff; border-left-color: #00d4ff; }
    
    .game-area { flex: 1; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/cubes.png'); padding: 20px; }
    .game-panel { display: none; width: 100%; max-width: 800px; margin: 0 auto; animation: slideIn 0.3s ease; padding-bottom: 50px; } .game-panel.active { display: flex; flex-direction: column; align-items: center; }
    .setup-screen { display: flex; flex-direction: column; align-items: center; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .play-screen { display: none; flex-direction: column; align-items: center; width: 100%; } .play-screen.active { display: flex; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 900; font-size: 1em; cursor: pointer; transition: 0.2s; text-transform: uppercase; } .btn:active { transform: scale(0.95); }
    .btn-green { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(29,185,84,0.4); } .btn-green:hover { background: #1ed760; }
    .btn-blue { background: var(--game-blue); color: #000; box-shadow: 0 4px 15px rgba(0,212,255,0.4); } .btn-blue:hover { background: #33e0ff; }
    .btn-red { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(255,23,68,0.4); } .btn-red:hover { background: #ff4060; }
    .input-box { background: #000; border: 2px solid #333; color: #fff; padding: 10px; font-size: 1em; border-radius: 8px; outline: none; width: 100%; } .input-box:focus { border-color: var(--game-blue); }
    
    #name-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    .name-box { background: #111; border: 2px solid #333; padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

    .game-title { font-family: var(--font-pixel) !important; color: var(--game-blue); margin: 0 0 10px; font-size: 1.5em; text-shadow: 0 0 10px rgba(0,212,255,0.4); text-align: center;}
    .game-desc { color: #aaa; font-size: 0.85em; margin-bottom: 20px; text-align: center; line-height: 1.6; background: #222; padding: 10px; border-radius: 8px; width: 100%;}
    .game-canvas { background: #050505; border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(0,212,255,0.1); width: 100%; max-width: 600px; margin: 0 auto; display: block; touch-action: none; }
    .game-score-board { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-pixel) !important; margin-bottom: 15px; color: var(--game-yellow); width: 100%; max-width: 600px; font-size: 1em; background: #111; padding: 10px 15px; border-radius: 8px; border: 1px solid #333;}
    
    .custom-settings-panel { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 500px; display: none; }
    .setting-row { display: flex; flex-direction: column; margin-bottom: 15px; }
    .setting-label { display: flex; justify-content: space-between; color: #ccc; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
    .setting-row input[type="range"] { width: 100%; accent-color: var(--game-blue); cursor: pointer; }
    .val-display { color: var(--game-yellow); font-family: monospace !important; font-size: 1.2em; font-weight: bold;}

    .vs-match-bar { width: 100%; max-width: 800px; background: rgba(0,0,0,0.8); border: 2px solid #444; border-radius: 8px; padding: 10px 20px; margin: 0 auto 15px; display: none; justify-content: space-around; align-items: center; font-family: var(--font-pixel); font-size: 0.85em; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .p-score { display: flex; flex-direction: column; align-items: center; gap: 5px; } .p-score .name { font-size: 0.7em; color: #888;} .p-score .pts { font-size: 1.4em; font-weight: bold; }
    .p1 .pts { color: var(--game-blue); } .p2 .pts { color: var(--accent); } .p3 .pts { color: var(--primary); } .p4 .pts { color: var(--game-yellow); }

    /* 遊戲獨立樣式 */
    .clicker-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; width: 100%; }
    .global-score { font-size: 4em; font-weight: 900; color: #ffb300; font-family: var(--font-pixel) !important; margin-bottom: 40px; text-shadow: 0 0 30px rgba(255, 179, 0, 0.5); }
    .big-click-btn { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #ff1744, #8a001a); border: 8px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: 900; color: white; user-select: none; transition: 0.05s ease;} .big-click-btn:active { transform: scale(0.9); }
    
    .ttt-board { display: grid; gap: 8px; width: 100%; max-width: 450px; aspect-ratio: 1/1; margin: 0 auto; opacity: 0.5; transition: 0.3s; } .ttt-board.active { opacity: 1; }
    .ttt-cell { background: #222; border-radius: 8px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-family: var(--font-pixel) !important; cursor: pointer; color: #fff; font-weight: 900; position: relative;}
    .ttt-cell.focused { outline: 4px solid var(--game-blue); outline-offset: -4px; z-index: 10; background: #333; box-shadow: 0 0 15px var(--game-blue);}
    .ttt-cell.x { color: var(--game-blue); text-shadow: 0 0 15px var(--game-blue); } .ttt-cell.o { color: var(--accent); text-shadow: 0 0 15px var(--accent); } .ttt-cell.t { color: #1db954; text-shadow: 0 0 15px #1db954; } .ttt-cell.s { color: #ffb300; text-shadow: 0 0 15px #ffb300; } 

    .mine-grid { display: grid; gap: 2px; background: #333; padding: 2px; border-radius: 4px; margin: 0 auto;}
    .mine-cell { width: 30px; height: 30px; background: #666; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; user-select: none; }
    .mine-cell.revealed { background: #222; box-shadow: inset 0 0 5px #000; } .mine-cell.focused { outline: 3px solid var(--game-blue); outline-offset: -3px; background: #888; z-index:10;}
    .mine-c-1 { color: #00d4ff; } .mine-c-2 { color: #1db954; } .mine-c-3 { color: #ff1744; }

    .g2048-grid { position: relative; background: #333; border-radius: 8px; width: 100%; max-width: 400px; aspect-ratio: 1/1; padding: 8px; margin: 0 auto;}
    .g2048-cell { position: absolute; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: 900; color: #fff; transition: all 0.15s ease-in-out; }

    .chat-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 800px; background: #111; border: 1px solid #333; border-radius: 12px; overflow: hidden; height: 60vh; }
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .chat-msg .bubble { background: #222; padding: 10px 15px; border-radius: 12px; width: fit-content; max-width: 80%; border-left: 3px solid var(--primary); word-break: break-word; }
    .chat-msg.mine { align-items: flex-end; } .chat-msg.mine .bubble { background: rgba(29, 185, 84, 0.15); border-left: none; border-right: 3px solid var(--primary); }

    /* 🏎️ 陀螺儀測試房專屬樣式 */
    .gyro-dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 600px; margin-bottom: 20px; }
    .gyro-card { background: #222; border: 1px solid #444; border-radius: 8px; padding: 15px; text-align: center; }
    .gyro-val { font-size: 2em; font-family: monospace; font-weight: bold; color: var(--game-blue); display: block; margin-top: 5px;}
    .car-sprite { width: 80px; height: 120px; background: var(--accent); border-radius: 8px; position: relative; transition: transform 0.1s; margin: 50px auto; display: flex; justify-content: center; align-items: center; font-weight: bold;}
    .car-sprite::before { content: ''; position: absolute; top: -10px; width: 60px; height: 20px; background: #fff; border-radius: 4px; } /* 擋風玻璃 */

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
    .toast { background: #fff; color: #000; padding: 12px 20px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <div id="name-modal">
      <div class="name-box">
          <h2 style="font-family: var(--font-pixel) !important; color: var(--game-yellow); font-size: 1.1em; line-height: 1.5;">Dogfish Arcade</h2>
          <p style="color:#aaa; font-size: 0.9em; margin-bottom: 25px;">請輸入名稱以啟動大廳</p>
          <input type="text" id="player-name-input" class="input-box" placeholder="訪客顯示名稱" maxlength="15" autocomplete="off" onkeypress="if(event.key === 'Enter') window.savePlayerName()" style="text-align: center; margin-bottom: 20px;">
          <button class="btn btn-green" style="width: 100%;" onclick="window.savePlayerName()">🚀 進入遊戲大廳</button>
      </div>
  </div>

  <div id="toast-container"></div>

  <div class="navbar">
      <div class="logo">ARCADE 競技場</div>
      <button class="btn-home" onclick="alert('獨立運行版')">🔙 離開</button>
  </div>

  <div class="lobby-container">
      
      <div class="sidebar" id="sidebar">
          <div class="player-profile">
              <div class="player-avatar" id="ui-avatar">?</div>
              <div class="player-name" id="ui-name">載入中</div>
              <button style="background:transparent; border:1px solid #555; color:#aaa; border-radius:10px; padding:4px 10px; font-size:0.8em; margin-top:10px; cursor:pointer;" onclick="document.getElementById('name-modal').style.display='flex'">切換帳號</button>
          </div>
          
          <div class="menu-section">📡 跨裝置實驗室</div>
          <div class="menu-item active" onclick="window.switchGame(event, 'gyro')">🏎️ 陀螺儀賽車方向盤</div>

          <div class="menu-section">🌐 網路社群區</div>
          <div class="menu-item" onclick="window.switchGame(event, 'clicker')">🖱️ 全站連擊大戰</div>
          <div class="menu-item" onclick="window.switchGame(event, 'tictactoe')">⭕ 井字對戰 (2-4人)</div>
          
          <div class="menu-section">🕹️ 經典單機挑戰</div>
          <div class="menu-item" onclick="window.switchGame(event, 'catch')">⚾ 像素接球</div>
          <div class="menu-item" onclick="window.switchGame(event, 'neon')">🚀 3D霓虹閃避</div>
          <div class="menu-item" onclick="window.switchGame(event, 'snake')">🐍 經典貪吃蛇</div>
          <div class="menu-item" onclick="window.switchGame(event, 'mine')">💣 經典踩地雷</div>
          <div class="menu-item" onclick="window.switchGame(event, 'breakout')">🧱 磚塊破壞者</div>
          <div class="menu-item" onclick="window.switchGame(event, 'flappy')">🐦 像素飛鳥</div>
          <div class="menu-item" onclick="window.switchGame(event, 'shooter')">🛸 宇宙戰機</div>
          <div class="menu-item" onclick="window.switchGame(event, 'g2048')">🔢 滑塊 2048</div>
      </div>

      <div class="game-area" id="game-area">
          <div id="game-container-wrapper" style="width: 100%; max-width: 800px;">
              </div>
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js"; 
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, serverTimestamp, collection, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyCPNG7FZNOXn-ZmbkysKmAaAeoqr5EImEI", authDomain: "dogfish-website.firebaseapp.com", projectId: "dogfish-website" }; 
    let app, db; try { app = initializeApp(firebaseConfig); db = getFirestore(app); } catch(e) {}

    // 🌟 全域防卡頓與狀態機 🌟
    window.playerName = "訪客"; window.activeGame = 'gyro';
    window.inputState = { up:false, down:false, left:false, right:false, action:false };
    window.currentGameLoop = null; window.currentGameTimer = null;
    
    // WebRTC DataChannel (用於陀螺儀 P2P)
    let peerConnection = null; let dataChannel = null; let gyroRoomId = null;

    window.simpleToast = function(msg, type='success') { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerText = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000); };
    window.savePlayerName = function() { let i = document.getElementById('player-name-input').value.trim(); if(i) { window.playerName = i; document.getElementById('name-modal').style.display='none'; document.getElementById('ui-name').innerText=i; document.getElementById('ui-avatar').innerText=i.charAt(0).toUpperCase(); if(db) initClickerSync(); } };

    // ==========================================
    // 🌟 遊戲庫與動態 HTML 生成器 🌟
    // ==========================================
    const gamesData = [
        { id: 'gyro', title: 'P2P 陀螺儀賽車方向盤', desc: '將手機當作實體方向盤，透過 WebRTC 零延遲傳輸傾斜數據至電腦端。<br>【提示】手機端選發送，電腦端選接收。', type: 'special', cfg: [] },
        { id: 'clicker', title: 'GLOBAL CLICKER', desc: '全站玩家即時累加點擊數！<br>【按鍵】空白鍵 (Space)', type: 'special', cfg: [] },
        { id: 'tictactoe', title: 'TIC-TAC-TOE', desc: '支援 2 到 4 人的井字棋。<br>【按鍵】WASD 移動游標，空白鍵下棋', type: 'board', cfg: [ {id:'p', lbl:'遊玩人數 (2-4)', min:2, max:4, val:2}, {id:'size', lbl:'棋盤大小 (3-8)', min:3, max:8, val:3}, {id:'win', lbl:'連線勝利條件', min:3, max:5, val:3} ]},
        { id: 'catch', title: 'PIXEL CATCH', desc: '接住綠球，避開紅炸彈。<br>【按鍵】A / D 左右移動', type: 'canvas', cfg: [ {id:'speed', lbl:'物品下落速度', min:2, max:20, val:5}, {id:'pspeed', lbl:'接板移動速度', min:5, max:40, val:18}, {id:'width', lbl:'接板寬度 (px)', min:30, max:200, val:80}, {id:'bomb', lbl:'炸彈出現機率 (%)', min:0, max:80, val:15}, {id:'range', lbl:'物品掉落範圍 (px)', min:50, max:380, val:200} ]},
        { id: 'neon', title: 'NEON DODGE 3D', desc: '閃避迎面而來的紅色 3D 方塊。<br>【按鍵】A / D 左右移動', type: 'canvas', cfg: [ {id:'speed', lbl:'方塊逼近速度', min:2, max:30, val:6}, {id:'pspeed', lbl:'飛船移動速度', min:2, max:30, val:8}, {id:'spawn', lbl:'方塊生成機率 (%)', min:1, max:50, val:6}, {id:'size', lbl:'方塊基礎大小 (px)', min:10, max:100, val:25} ]},
        { id: 'snake', title: 'CLASSIC SNAKE', desc: '吃蘋果變長，撞牆即死。<br>【按鍵】W A S D 上下左右', type: 'canvas', cfg: [ {id:'speed', lbl:'移動延遲 (毫秒, 越小越快)', min:30, max:300, val:100} ]},
        { id: 'mine', title: 'MINESWEEPER', desc: '經典踩地雷。<br>【按鍵】WASD 移動，空白鍵挖開，F鍵插旗', type: 'board', cfg: [ {id:'w', lbl:'棋盤寬度', min:5, max:25, val:10}, {id:'h', lbl:'棋盤高度', min:5, max:25, val:10}, {id:'c', lbl:'地雷總數量', min:5, max:100, val:15} ]},
        { id: 'breakout', title: 'BRICK BREAKER', desc: '經典打磚塊。<br>【按鍵】A / D 左右移動，空白鍵發球', type: 'canvas', cfg: [ {id:'speed', lbl:'彈力球速度', min:2, max:20, val:5}, {id:'pspeed', lbl:'托板移動速度', min:5, max:30, val:12}, {id:'width', lbl:'托板寬度 (px)', min:30, max:200, val:80} ]},
        { id: 'flappy', title: 'FLAPPY BIRD', desc: '穿梭水管。<br>【按鍵】空白鍵跳躍', type: 'canvas', cfg: [ {id:'g', lbl:'重力向下引力', min:10, max:100, val:30}, {id:'j', lbl:'跳躍上升力', min:2, max:15, val:6}, {id:'gap', lbl:'水管通道間距', min:50, max:300, val:130}, {id:'s', lbl:'水管移動速度', min:1, max:15, val:3} ]},
        { id: 'shooter', title: 'SPACE SHOOTER', desc: '射擊敵機。<br>【按鍵】A / D 左右移動，空白鍵射擊', type: 'canvas', cfg: [ {id:'es', lbl:'敵機下落速度', min:1, max:15, val:3}, {id:'er', lbl:'敵機生成機率', min:1, max:20, val:3}, {id:'ps', lbl:'玩家移動速度', min:2, max:20, val:6}, {id:'bs', lbl:'子彈飛行速度', min:5, max:30, val:10} ]},
        { id: 'g2048', title: '2048 PUZZLE', desc: '滑動合併數字。<br>【按鍵】WASD 滑動', type: 'html', cfg: [ {id:'size', lbl:'網格大小 (N x N)', min:3, max:8, val:4} ]}
    ];

    function renderGamesDOM() {
        let html = '';
        gamesData.forEach(g => {
            html += `<div id="game-${g.id}" class="game-panel ${g.id==='gyro'?'active':''}">`;
            
            // --- 設定畫面 Setup ---
            html += `<div class="setup-screen" id="setup-${g.id}">`;
            html += `<h2 class="game-title">${g.title}</h2><div class="game-desc">${g.desc}</div>`;
            
            // 🏎️ 手機陀螺儀專屬介面
            if(g.id === 'gyro') {
                html += `<div style="display:flex; gap:15px; width:100%; margin-bottom:20px;">
                            <button class="btn btn-green" onclick="createGyroRoom()">📱 建立房間 (手機發送端)</button>
                         </div>
                         <div style="background:#222; padding:20px; border-radius:8px; width:100%; border:1px solid #444;">
                            <input type="text" id="gyro-room-input" class="input-box" placeholder="輸入 6 碼代號">
                            <button class="btn btn-blue" style="margin-bottom:0;" onclick="joinGyroRoom()">🖥️ 加入房間 (電腦接收端)</button>
                         </div>`;
            }
            // 一般單機遊戲自訂參數介面
            else if(g.cfg.length > 0) {

        dataChannel.onmessage = event => {

    window.renderTttBoard = function(arr, size) {

            ctx.fillStyle = '#ff1744'; 
            for(let i=blocks.length-1; i>=0; i--) { let b = blocks[i]; b.z -= speed; if(b.z <= 0) { blocks.splice(i,1); score++; document.getElementById('neon-score').innerText=score; continue; } let scale = 100 / b.z; let projX = (b.x - 200) * scale + 200; let projY = (b.y - 250) * scale + 250 + (100 - b.z)*1.5; let size = bSize * scale; ctx.fillRect(projX - size/2, projY - size/2, size, size); if(b.z < 10 && Math.abs(projX - pX) < size/2 + 15 && projY > 400 && projY < 450) isOver = true; }
            ctx.fillStyle = '#00d4ff'; ctx.beginPath(); ctx.moveTo(pX, 400); ctx.lineTo(pX - 20, 440); ctx.lineTo(pX + 20, 440); ctx.fill(); window.currentGameLoop = requestAnimationFrame(loop);
        }
        document.getElementById('neon-score').innerText = 0; window.currentGameLoop = requestAnimationFrame(loop);
    };

    window.init_snake = function() {
        const cvs = document.getElementById('snake-canvas'); const ctx = cvs.getContext('2d');
        let speedInterval = window.getVal('snake', 'speed'); const grid = 20; let snake = [{x: 10, y: 10}]; let food = {x: 15, y: 15}; window.sDx = 1; window.sDy = 0; let score = 0;
        window.changeSnakeDir = function(dx, dy) { if(window.sDx === -dx || window.sDy === -dy) return; window.sDx = dx; window.sDy = dy; };
        function loop() {
            let head = { x: snake[0].x + window.sDx, y: snake[0].y + window.sDy };
            if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) return;
            snake.unshift(head); if(head.x === food.x && head.y === food.y) { score++; document.getElementById('snake-score').innerText = score; food = { x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20) }; } else snake.pop();
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 400, 400); ctx.fillStyle = '#ff1744'; ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2); ctx.fillStyle = '#1db954'; snake.forEach(s => ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2));
            window.currentGameTimer = setTimeout(loop, speedInterval);
        }
        document.getElementById('snake-score').innerText = 0; window.currentGameTimer = setTimeout(loop, speedInterval);
    };

    window.init_mine = function() {
        let w = window.getVal('mine','w'); let h = window.getVal('mine','h'); let mC = window.getVal('mine','c');
        const g = document.getElementById('mine-board'); g.style.gridTemplateColumns = `repeat(${w}, 1fr)`; g.innerHTML=''; let f=mC; document.getElementById('mine-flags').innerText=f; let go=false; window.mineR=Math.floor(h/2); window.mineC=Math.floor(w/2); let s=new Set(), cells=[]; while(s.size<mC) s.add(Math.floor(Math.random()*w*h));
        for(let i=0;i<w*h;i++){ let c=document.createElement('div'); c.className='mine-cell'; c.id=`m-cell-${i}`; c.onclick=()=>window.actionMineCursor('reveal',i); c.oncontextmenu=(e)=>{e.preventDefault();window.actionMineCursor('flag',i);}; cells.push(c); g.appendChild(c); let count=0; if(!s.has(i)){let r=Math.floor(i/w), cc=i%w; for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc; if(nr>=0&&nr<h&&nc>=0&&nc<w&&s.has(nr*w+nc))count++;}}} c.dataset.count=count; c.dataset.mine=s.has(i); }
        window.moveMineCursor=function(dr,dc){if(go)return; document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.remove('focused'); window.mineR=Math.max(0,Math.min(h-1,window.mineR+dr)); window.mineC=Math.max(0,Math.min(w-1,window.mineC+dc)); document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.add('focused');};
        window.actionMineCursor=function(a,idx=null){if(go)return; let i=idx!==null?idx:(window.mineR*w+window.mineC); let c=cells[i]; if(a==='flag'){if(!c.classList.contains('revealed')){if(c.innerText==='🚩'){c.innerText='';f++;}else if(f>0){c.innerText='🚩';f--;} document.getElementById('mine-flags').innerText=f;}}else if(a==='reveal'){if(c.classList.contains('revealed')||c.innerText==='🚩')return; if(c.dataset.mine==='true'){c.innerText='💣';c.style.background='red';go=true;}else{c.classList.add('revealed');let cnt=parseInt(c.dataset.count);if(cnt>0){c.innerText=cnt;c.classList.add(`mine-c-${cnt}`);}if(cnt===0){let r=Math.floor(i/w),cc=i%w;for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc;if(nr>=0&&nr<h&&nc>=0&&nc<w)window.actionMineCursor('reveal',nr*w+nc);}}}}}};
        document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.add('focused');
    };

    window.breakoutStartBall = function() { window.ballActive = true; };
    window.init_breakout = function() {
        const cvs = document.getElementById('breakout-canvas'); const ctx = cvs.getContext('2d');
        let speed = window.getVal('breakout','speed'); let pSpeed = window.getVal('breakout','pspeed'); let pW = window.getVal('breakout','width');
        let pX = 200, bX = 200, bY = 430, dx = speed, dy = -speed, score = 0, isOver = false; window.ballActive = false;
        let bricks = []; let bW = 400/8 - 4; for(let r=0; r<4; r++) { for(let c=0; c<8; c++) { bricks.push({x: c*(bW+4)+2, y: r*20+30, w: bW, h: 15, status: 1}); } }
        function loop() {
            if(isOver) return;
            if(window.inputState.left && pX > pW/2) pX -= pSpeed; if(window.inputState.right && pX < 400-pW/2) pX += pSpeed;
            if(!window.ballActive) { bX = pX; bY = 430; } else { bX += dx; bY += dy; if(bX < 5 || bX > 395) dx = -dx; if(bY < 5) dy = -dy; if(bY > 440 && bY < 450 && bX > pX - pW/2 && bX < pX + pW/2) { dy = -dy; dx = ((bX - pX) / (pW/2)) * speed; } else if(bY > 500) isOver = true; }
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 400, 500);
            bricks.forEach(b => { if(b.status === 1) { if(bX > b.x && bX < b.x+b.w && bY > b.y && bY < b.y+b.h) { dy = -dy; b.status = 0; score+=10; document.getElementById('breakout-score').innerText = score; } else { ctx.fillStyle = '#b000ff'; ctx.fillRect(b.x, b.y, b.w, b.h); } }});
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bX, bY, 5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#00d4ff'; ctx.fillRect(pX - pW/2, 440, pW, 10);
            window.currentGameLoop = requestAnimationFrame(loop);
        }
        document.getElementById('breakout-score').innerText = 0; window.currentGameLoop = requestAnimationFrame(loop);
    };

    window.flappyJump = function() { window.birdVy = -window.getVal('flappy','j'); };
    window.init_flappy = function() {
        const cvs = document.getElementById('flappy-canvas'); const ctx = cvs.getContext('2d');
        let g = window.getVal('flappy','g')/100; let gap = window.getVal('flappy','gap'); let s = window.getVal('flappy','s');
        window.birdY = 250; window.birdVy = 0; let score = 0, frames = 0, pipes = [], isOver = false;
        function loop() {
            if(isOver) return; window.birdVy += g; window.birdY += window.birdVy; if(window.birdY > 480 || window.birdY < 0) isOver = true;
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 400, 500);
            if(frames % Math.floor(150/s) === 0) { let topH = Math.random() * (350 - gap) + 50; pipes.push({ x: 400, w: 40, top: topH, bot: topH + gap }); }
            ctx.fillStyle = '#1ed760';
            for(let i=pipes.length-1; i>=0; i--) { let p = pipes[i]; p.x -= s; ctx.fillRect(p.x, 0, p.w, p.top); ctx.fillRect(p.x, p.bot, p.w, 500 - p.bot); if(50 > p.x && 50 < p.x+p.w && (window.birdY < p.top || window.birdY > p.bot)) isOver = true; if(p.x === 50) { score++; document.getElementById('flappy-score').innerText = score; } if(p.x < -50) pipes.splice(i, 1); }
            ctx.fillStyle = '#ffb300'; ctx.fillRect(50, window.birdY, 20, 20); frames++; window.currentGameLoop = requestAnimationFrame(loop);
        }
        document.getElementById('flappy-score').innerText = 0; window.currentGameLoop = requestAnimationFrame(loop);
    };

    window.shooterFire = function() { window.bullets.push({x: window.shooterPx, y: 430}); };
    window.init_shooter = function() {
        const cvs = document.getElementById('shooter-canvas'); const ctx = cvs.getContext('2d');
        let es = window.getVal('shooter','es'); let er = window.getVal('shooter','er')/100; let ps = window.getVal('shooter','ps'); let bs = window.getVal('shooter','bs');
        window.shooterPx = 200; window.bullets = []; let enemies = [], score = 0, isOver = false;
        function loop() {
            if(isOver) return;
            if(window.inputState.left && window.shooterPx > 20) window.shooterPx -= ps; if(window.inputState.right && window.shooterPx < 380) window.shooterPx += ps;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 400, 500); ctx.fillStyle = '#fff'; for(let i=0; i<5; i++) { ctx.fillRect(Math.random()*400, Math.random()*500, 2, 2); }
            if(Math.random() < er) enemies.push({ x: Math.random()*360+20, y: -20 });
            ctx.fillStyle = '#ffb300'; for(let i=window.bullets.length-1; i>=0; i--) { let b = window.bullets[i]; b.y -= bs; ctx.fillRect(b.x-2, b.y, 4, 10); if(b.y < 0) window.bullets.splice(i, 1); }
            ctx.fillStyle = '#ff1744';
            for(let i=enemies.length-1; i>=0; i--) {
                let e = enemies[i]; e.y += es; ctx.beginPath(); ctx.moveTo(e.x, e.y+10); ctx.lineTo(e.x-15, e.y-10); ctx.lineTo(e.x+15, e.y-10); ctx.fill();
                for(let j=window.bullets.length-1; j>=0; j--) { let b = window.bullets[j]; if(Math.abs(b.x - e.x) < 15 && Math.abs(b.y - e.y) < 15) { enemies.splice(i, 1); window.bullets.splice(j, 1); score+=10; document.getElementById('shooter-score').innerText = score; break; } }
                if(e.y > 440 && Math.abs(window.shooterPx - e.x) < 20) isOver = true;
            }
            ctx.fillStyle = '#00d4ff'; ctx.beginPath(); ctx.moveTo(window.shooterPx, 420); ctx.lineTo(window.shooterPx-20, 450); ctx.lineTo(window.shooterPx+20, 450); ctx.fill(); window.currentGameLoop = requestAnimationFrame(loop);
        }
        document.getElementById('shooter-score').innerText = 0; window.currentGameLoop = requestAnimationFrame(loop);
    };

    window.init_g2048 = function() {
        let size = window.getVal('g2048', 'size'); let b = Array(size*size).fill(0); let score = 0;
        const grid = document.getElementById('g2048-board'); grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`; grid.innerHTML = ''; let cells = [];
        for(let i=0; i<size*size; i++) { let bg = document.createElement('div'); bg.style.background='#222'; bg.style.borderRadius='6px'; grid.appendChild(bg); let c = document.createElement('div'); c.className = 'g2048-cell'; c.style.width=`calc(100% / ${size} - 8px)`; c.style.height=`calc(100% / ${size} - 8px)`; cells.push(c); grid.appendChild(c); }

        function addTile() { let emp = []; b.forEach((v,i)=>{if(v===0) emp.push(i)}); if(emp.length>0) b[emp[Math.floor(Math.random()*emp.length)]] = Math.random()<0.9?2:4; }
        function draw() {
            for(let i=0; i<size*size; i++) {
                let v = b[i]; let c = cells[i]; let r = Math.floor(i/size), col = i%size;
                c.style.top = `calc(${r} * (100% / ${size}) + 4px)`; c.style.left = `calc(${col} * (100% / ${size}) + 4px)`;
                let color = '#222'; let tColor = '#fff';
                if(v===2) color='#eee4da', tColor='#000'; else if(v===4) color='#ede0c8', tColor='#000'; else if(v===8) color='#f2b179'; else if(v===16) color='#f59563'; else if(v===32) color='#f67c5f'; else if(v===64) color='#f65e3b'; else if(v>=128) color='#edcf72';
                c.style.background = v>0 ? color : 'transparent'; c.style.color = tColor; c.innerText = v>0 ? v : '';
            }
            document.getElementById('g2048-score').innerText = score;
        }
        
        window.slide2048 = function(dir) {
            let moved = false; function op(row) { let arr = row.filter(v=>v!==0); for(let i=0; i<arr.length-1; i++) { if(arr[i]===arr[i+1]) { arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); arr.push(0); } } while(arr.length < size) arr.push(0); return arr; }
            if(dir==='left'||dir==='a'||dir==='ArrowLeft') { for(let r=0; r<size; r++) { let row=[]; for(let c=0; c<size; c++) row.push(b[r*size+c]); let newRow=op(row); for(let c=0; c<size; c++) { if(b[r*size+c]!==newRow[c]) moved=true; b[r*size+c]=newRow[c]; } } }
            if(dir==='right'||dir==='d'||dir==='ArrowRight') { for(let r=0; r<size; r++) { let row=[]; for(let c=0; c<size; c++) row.push(b[r*size+c]); row.reverse(); let newRow=op(row); newRow.reverse(); for(let c=0; c<size; c++) { if(b[r*size+c]!==newRow[c]) moved=true; b[r*size+c]=newRow[c]; } } }
            if(dir==='up'||dir==='w'||dir==='ArrowUp') { for(let c=0; c<size; c++) { let col=[]; for(let r=0; r<size; r++) col.push(b[r*size+c]); let newCol=op(col); for(let r=0; r<size; r++) { if(b[r*size+c]!==newCol[r]) moved=true; b[r*size+c]=newCol[r]; } } }
            if(dir==='down'||dir==='s'||dir==='ArrowDown') { for(let c=0; c<size; c++) { let col=[]; for(let r=0; r<size; r++) col.push(b[r*size+c]); col.reverse(); let newCol=op(col); newCol.reverse(); for(let r=0; r<size; r++) { if(b[r*size+c]!==newCol[r]) moved=true; b[r*size+c]=newCol[r]; } } }
            if(moved) { addTile(); draw(); }
        };
        addTile(); addTile(); draw();
    };

    window.addEventListener('DOMContentLoaded', () => { let n = localStorage.getItem('dogfish_game_name'); if(n) { window.playerName = n; document.getElementById('name-modal').style.display='none'; document.getElementById('ui-name').innerText=n; document.getElementById('ui-avatar').innerText=n.charAt(0).toUpperCase(); if(db) initClickerSync(); } else { document.getElementById('name-modal').style.display='flex'; } });
  </script>
