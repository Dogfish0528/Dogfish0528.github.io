<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogfish Arcade | 終極遊戲大廳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       系統底層與全域字體 (徹底消滅標楷體)
    ========================================================= */
    :root { 
        --primary: #1db954; --accent: #ff1744; --game-blue: #00d4ff; --game-yellow: #ffb300;
        --font-main: 'Noto Sans TC', 'Microsoft JhengHei', 'Segoe UI', sans-serif; 
        --font-pixel: 'Press Start 2P', 'Microsoft JhengHei', cursive;
    }
    
    * { font-family: var(--font-main) !important; } /* 強制全域使用黑體，拒絕標楷體 */
    
    body { background: radial-gradient(circle at top, #1a0b12, #050505); background-attachment: fixed; color: #fff; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    button, input, select { outline: none; }
    ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    
    /* 導覽列 */
    .navbar { height: 60px; background: rgba(10,10,10,0.95); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; flex-shrink: 0; }
    .logo { font-size: 1.2em; font-weight: 900; background: linear-gradient(90deg, #ff1744, #ffb300); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-home { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #555; padding: 6px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.2s; font-size: 0.9em; cursor:pointer;} .btn-home:hover { background: #fff; color: #000; }

    /* 版面配置 */
    .lobby-container { display: flex; flex: 1; overflow: hidden; position: relative; }
    .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; flex-shrink: 0; z-index: 100; transition: left 0.3s ease; }
    .player-profile { padding: 0 20px 15px; border-bottom: 1px solid #333; margin-bottom: 10px; text-align: center; }
    .player-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; color: #000; }
    .player-name { font-size: 1.2em; font-weight: 900; color: #fff; word-break: break-all;}
    .menu-section { padding: 5px 20px; color: #555; font-size: 0.8em; font-weight: bold; margin-top: 10px; }
    .menu-item { padding: 10px 20px; color: #aaa; font-weight: bold; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; font-size:0.9em;}
    .menu-item:hover { background: #1a1a1a; color: #fff; } .menu-item.active { background: #222; color: #00d4ff; border-left-color: #00d4ff; }
    
    /* 遊戲區 */
    .game-area { flex: 1; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/cubes.png'); padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .game-panel { display: none; width: 100%; max-width: 800px; animation: slideIn 0.3s ease; padding-bottom: 50px; } .game-panel.active { display: block; }
    .setup-screen { display: flex; flex-direction: column; align-items: center; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .play-screen { display: none; flex-direction: column; align-items: center; width: 100%; } .play-screen.active { display: flex; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* 按鈕與表單 */
    .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 900; font-size: 1.1em; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;} .btn:active { transform: scale(0.95); }
    .btn-green { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(29,185,84,0.4); } .btn-green:hover { background: #1ed760; }
    .btn-blue { background: var(--game-blue); color: #000; box-shadow: 0 4px 15px rgba(0,212,255,0.4); } .btn-blue:hover { background: #33e0ff; }
    .btn-red { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(255,23,68,0.4); } .btn-red:hover { background: #ff4060; }
    .input-box { background: #000; border: 2px solid #333; color: #fff; padding: 12px; font-size: 1em; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; font-weight: bold;} .input-box:focus { border-color: var(--game-blue); }
    
    #name-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    .name-box { background: #111; border: 2px solid #333; padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

    /* 遊戲共用 UI */
    .game-title { font-family: var(--font-pixel) !important; color: var(--game-blue); margin: 0 0 10px; font-size: 1.8em; text-shadow: 0 0 10px rgba(0,212,255,0.4); text-align: center;}
    .game-desc { color: #aaa; font-size: 0.9em; margin-bottom: 20px; text-align: center; line-height: 1.6; font-weight: bold; background: #222; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box;}
    .game-canvas { background: #050505; border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(0,212,255,0.1); width: 100%; max-width: 600px; margin: 0 auto; display: block; }
    .game-score-board { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-pixel) !important; margin-bottom: 15px; color: var(--game-yellow); width: 100%; max-width: 600px; font-size: 1em; background: #111; padding: 10px 15px; border-radius: 8px; box-sizing: border-box; border: 1px solid #333;}
    
    /* 🌟 全新自訂參數面板 (更清楚的數值與排版) 🌟 */
    .custom-settings-panel { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 25px; border-radius: 8px; margin-bottom: 25px; width: 100%; max-width: 500px; box-sizing: border-box; }
    .setting-row { display: flex; flex-direction: column; margin-bottom: 20px; }
    .setting-label { display: flex; justify-content: space-between; color: #ccc; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
    .setting-row input[type="range"] { width: 100%; accent-color: var(--game-blue); cursor: pointer; }
    .val-display { color: var(--game-yellow); font-family: monospace !important; font-size: 1.2em; font-weight: bold;}

    /* 遊戲獨立樣式 */
    .clicker-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; width: 100%; }
    .global-score { font-size: 5em; font-weight: 900; color: #ffb300; font-family: var(--font-pixel) !important; margin-bottom: 40px; text-align: center; text-shadow: 0 0 30px rgba(255, 179, 0, 0.5); }
    .big-click-btn { width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, #ff1744, #8a001a); border: 8px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2.5em; font-weight: 900; color: white; user-select: none; transition: 0.05s ease; margin: 0 auto; box-shadow: 0 10px 30px rgba(255,23,68,0.5);} .big-click-btn:active { transform: scale(0.9); }
    
    .ttt-board { display: grid; gap: 8px; width: 100%; max-width: 450px; aspect-ratio: 1/1; margin: 0 auto; opacity: 0.5; transition: 0.3s; } .ttt-board.active { opacity: 1; }
    .ttt-cell { background: #222; border-radius: 8px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-family: var(--font-pixel) !important; cursor: pointer; color: #fff; font-weight: 900; position: relative;}
    .ttt-cell.focused { outline: 4px solid var(--game-blue); outline-offset: -4px; z-index: 10; background: #333; box-shadow: 0 0 15px var(--game-blue);}
    .ttt-cell.x { color: var(--game-blue); text-shadow: 0 0 15px var(--game-blue); } .ttt-cell.o { color: var(--accent); text-shadow: 0 0 15px var(--accent); } .ttt-cell.t { color: #1db954; text-shadow: 0 0 15px #1db954; } .ttt-cell.s { color: #ffb300; text-shadow: 0 0 15px #ffb300; } 

    .mine-grid { display: grid; gap: 2px; background: #333; padding: 2px; border-radius: 4px; margin: 0 auto;}
    .mine-cell { width: 30px; height: 30px; background: #666; display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: monospace !important; cursor: pointer; user-select: none; }
    .mine-cell.revealed { background: #222; box-shadow: inset 0 0 5px #000; } .mine-cell.focused { outline: 3px solid var(--game-blue); outline-offset: -3px; background: #888; z-index:10;}
    .mine-c-1 { color: #00d4ff; } .mine-c-2 { color: #1db954; } .mine-c-3 { color: #ff1744; }

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
    .toast { background: #fff; color: #000; padding: 12px 20px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <!-- 登入遮罩 -->
  <div id="name-modal">
      <div class="name-box">
          <h2 style="font-family: var(--font-pixel) !important; color: var(--game-yellow); font-size: 1.3em; margin-bottom: 25px;">Dogfish Arcade</h2>
          <input type="text" id="player-name-input" class="input-box" placeholder="輸入玩家顯示名稱" maxlength="15" autocomplete="off" onkeypress="if(event.key === 'Enter') window.savePlayerName()" style="text-align: center; margin-bottom: 20px;">
          <button class="btn btn-green" style="width: 100%;" onclick="window.savePlayerName()">🚀 進入遊戲大廳</button>
      </div>
  </div>

  <div id="toast-container"></div>

  <!-- 頂部導覽 -->
  <div class="navbar">
      <div class="logo">ARCADE 競技場</div>
      <button class="btn-home" onclick="alert('獨立運行版，如需返回請修改原始碼跳轉')">🔙 返回主頁</button>
  </div>

  <div class="lobby-container">
      
      <!-- 左側選單 -->
      <div class="sidebar" id="sidebar">
          <div class="player-profile">
              <div class="player-avatar" id="ui-avatar">?</div>
              <div class="player-name" id="ui-name">載入中</div>
              <button style="background:transparent; border:1px solid #555; color:#aaa; border-radius:10px; padding:4px 10px; font-size:0.8em; margin-top:10px; cursor:pointer;" onclick="document.getElementById('name-modal').style.display='flex'">切換帳號</button>
          </div>
          
          <div class="menu-section">🌐 網路社群區</div>
          <div class="menu-item active" onclick="window.switchGame(event, 'clicker')">🖱️ 全站連擊</div>
          <div class="menu-item" onclick="window.switchGame(event, 'tictactoe')">⭕ 井字對戰 (2-4人)</div>
          
          <div class="menu-section">🕹️ 經典自訂挑戰 (支援WASD)</div>
          <div class="menu-item" onclick="window.switchGame(event, 'catch')">⚾ 像素接球</div>
          <div class="menu-item" onclick="window.switchGame(event, 'neon')">🚀 3D霓虹閃避</div>
          <div class="menu-item" onclick="window.switchGame(event, 'snake')">🐍 貪吃蛇</div>
          <div class="menu-item" onclick="window.switchGame(event, 'mine')">💣 踩地雷</div>
          <div class="menu-item" onclick="window.switchGame(event, 'breakout')">🧱 打磚塊</div>
      </div>

      <!-- 右側遊戲主區 -->
      <div class="game-area" id="game-area">
          <div id="game-container-wrapper" style="width: 100%; max-width: 800px;">
              <!-- 遊戲 DOM 會透過 JS 安全注入 -->
          </div>
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js"; 
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, serverTimestamp, collection, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyCPNG7FZNOXn-ZmbkysKmAaAeoqr5EImEI", authDomain: "dogfish-website.firebaseapp.com", projectId: "dogfish-website" }; 
    let app, db; try { app = initializeApp(firebaseConfig); db = getFirestore(app); } catch(e) {}

    // ==========================================
    // 🌟 全域變數與防卡頓核心 🌟
    // ==========================================
    window.playerName = "訪客"; window.activeGame = 'clicker';
    window.inputState = { up:false, down:false, left:false, right:false, action:false };
    
    // 🔥 最重要：單一執行緒鎖，保證絕對不會卡死！
    window.currentGameLoop = null; 
    window.currentGameTimer = null;

    window.simpleToast = function(msg, type='success') { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerText = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000); };
    window.savePlayerName = function() { let i = document.getElementById('player-name-input').value.trim(); if(i) { window.playerName = i; document.getElementById('name-modal').style.display='none'; document.getElementById('ui-name').innerText=i; document.getElementById('ui-avatar').innerText=i.charAt(0).toUpperCase(); if(db) initClickerSync(); } };

    // ==========================================
    // 🌟 遊戲庫與動態 HTML 生成器 (防截斷機制) 🌟
    // ==========================================
    const gamesData = [
        { id: 'clicker', title: 'GLOBAL CLICKER', desc: '全站玩家即時累加點擊數！<br>【按鍵】空白鍵 (Space)', type: 'special', cfg: [] },
        { id: 'tictactoe', title: 'TIC-TAC-TOE', desc: '支援 2 到 4 人的井字棋。<br>【按鍵】WASD 移動游標，空白鍵下棋', type: 'board', cfg: [
            {id:'p', lbl:'遊玩人數 (2-4)', min:2, max:4, val:2}, {id:'size', lbl:'棋盤大小 (3-8)', min:3, max:8, val:3}, {id:'win', lbl:'連線勝利條件', min:3, max:5, val:3}
        ]},
        { id: 'catch', title: 'PIXEL CATCH', desc: '接住綠球，避開紅炸彈。<br>【按鍵】A / D 左右移動', type: 'canvas', cfg: [
            {id:'speed', lbl:'物品下落速度', min:2, max:20, val:5}, {id:'pspeed', lbl:'接板移動速度', min:5, max:40, val:18}, {id:'width', lbl:'接板寬度 (px)', min:30, max:200, val:80}, {id:'bomb', lbl:'炸彈出現機率 (%)', min:0, max:80, val:15}, {id:'range', lbl:'物品掉落範圍 (px)', min:50, max:380, val:200}
        ]},
        { id: 'neon', title: 'NEON DODGE 3D', desc: '閃避迎面而來的紅色 3D 方塊。<br>【按鍵】A / D 左右移動', type: 'canvas', cfg: [
            {id:'speed', lbl:'方塊逼近速度', min:2, max:30, val:6}, {id:'pspeed', lbl:'飛船移動速度', min:2, max:30, val:8}, {id:'spawn', lbl:'方塊生成機率 (%)', min:1, max:50, val:6}, {id:'size', lbl:'方塊基礎大小 (px)', min:10, max:100, val:25}
        ]},
        { id: 'snake', title: 'CLASSIC SNAKE', desc: '吃蘋果變長，撞牆即死。<br>【按鍵】W A S D 上下左右', type: 'canvas', cfg: [
            {id:'speed', lbl:'移動延遲 (毫秒, 越小越快)', min:30, max:300, val:100}
        ]},
        { id: 'mine', title: 'MINESWEEPER', desc: '經典踩地雷。<br>【按鍵】WASD 移動，空白鍵挖開，F鍵插旗', type: 'board', cfg: [
            {id:'w', lbl:'棋盤寬度', min:5, max:25, val:10}, {id:'h', lbl:'棋盤高度', min:5, max:25, val:10}, {id:'c', lbl:'地雷總數量', min:5, max:100, val:15}
        ]},
        { id: 'breakout', title: 'BRICK BREAKER', desc: '經典打磚塊。<br>【按鍵】A / D 左右移動，空白鍵發球', type: 'canvas', cfg: [
            {id:'speed', lbl:'彈力球速度', min:2, max:20, val:5}, {id:'pspeed', lbl:'托板移動速度', min:5, max:30, val:12}, {id:'width', lbl:'托板寬度 (px)', min:30, max:200, val:80}
        ]}
    ];

    function renderGamesDOM() {
        let html = '';
        gamesData.forEach(g => {
            html += `<div id="game-${g.id}" class="game-panel ${g.id==='clicker'?'active':''}">`;
            
            // 設定畫面 Setup
            html += `<div class="setup-screen" id="setup-${g.id}">`;
            html += `<h2 class="game-title">${g.title}</h2><div class="game-desc">${g.desc}</div>`;
            
            if(g.cfg.length > 0) {
                html += `<div class="custom-settings-panel" style="display:block;">`;
                g.cfg.forEach(c => {
                    html += `<div class="setting-row"><div class="setting-label"><span>${c.lbl}</span><span class="val-display" id="val-${g.id}-${c.id}">${c.val}</span></div><input type="range" id="cfg-${g.id}-${c.id}" min="${c.min}" max="${c.max}" value="${c.val}" oninput="document.getElementById('val-${g.id}-${c.id}').innerText=this.value"></div>`;
                });
                html += `</div>`;
                html += `<button class="btn btn-green" style="width:100%; max-width:400px;" onclick="window.startGame('${g.id}')">🚀 載入設定並開始</button>`;
            }
            html += `</div>`; // end setup

            // 遊玩畫面 Play
            html += `<div class="play-screen" id="play-${g.id}">`;
            if(g.id === 'clicker') {
                html += `<div class="clicker-wrapper"><div class="global-score" id="clicker-score">0</div><div class="big-click-btn" onmousedown="window.doClick(event)">PUSH</div></div>`;
            } else {
                html += `<div class="game-score-board">`;
                if(g.id === 'tictactoe') html += `<span id="ttt-status">等待中</span>`;
                else if(g.id === 'mine') html += `<span>🚩 旗幟: <span id="mine-flags">0</span></span>`;
                else if(g.id === 'catch') html += `<span>SCORE: <span id="${g.id}-score">0</span> | LIVES: <span id="catch-lives">3</span></span>`;
                else html += `<span>SCORE: <span id="${g.id}-score">0</span></span>`;
                html += `<button class="btn btn-blue" style="padding:8px 15px; font-size:0.9em;" onclick="window.backToSetup('${g.id}')">⏹️ 返回設定</button></div>`;
                
                if(g.type === 'canvas') html += `<canvas id="${g.id}-canvas" class="game-canvas" width="400" height="500" ${g.id==='snake'?'height="400"':''}></canvas>`;
                else html += `<div id="${g.id}-board" class="${g.id==='tictactoe'?'ttt-board':'mine-grid'}"></div>`;
                
                if(g.id === 'tictactoe') html += `<button class="btn btn-red" id="ttt-restart-btn" style="margin-top:20px; display:none;" onclick="window.startGame('tictactoe')">再來一局</button>`;
            }
            html += `</div></div>`; // end play / end panel
        });
        document.getElementById('game-container-wrapper').innerHTML = html;
    }
    renderGamesDOM();

    // ==========================================
    // 🌟 全域鍵盤路由器 (WASD 完美對應) 🌟
    // ==========================================
    document.addEventListener('keydown', e => {
        let k = e.key.toLowerCase(), c = e.code;
        if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '].includes(k) || c === 'Space') { if(document.activeElement.tagName !== 'INPUT') e.preventDefault(); }
        
        if(k==='w' || k==='arrowup') window.inputState.up = true; if(k==='s' || k==='arrowdown') window.inputState.down = true;
        if(k==='a' || k==='arrowleft') window.inputState.left = true; if(k==='d' || k==='arrowright') window.inputState.right = true;
        if(c==='Space') window.inputState.action = true;

        if (window.activeGame === 'clicker' && c === 'Space') window.doClick({clientX: window.innerWidth/2, clientY: window.innerHeight/2});
        if (window.activeGame === 'tictactoe') { if(k==='w'||k==='arrowup') window.moveTttCursor(-1,0); if(k==='s'||k==='arrowdown') window.moveTttCursor(1,0); if(k==='a'||k==='arrowleft') window.moveTttCursor(0,-1); if(k==='d'||k==='arrowright') window.moveTttCursor(0,1); if(c==='Space') window.actionTttCursor(); }
        if (window.activeGame === 'mine') { if(k==='w'||k==='arrowup') window.moveMineCursor(-1,0); if(k==='s'||k==='arrowdown') window.moveMineCursor(1,0); if(k==='a'||k==='arrowleft') window.moveMineCursor(0,-1); if(k==='d'||k==='arrowright') window.moveMineCursor(0,1); if(c==='Space') window.actionMineCursor('reveal'); if(k==='f') window.actionMineCursor('flag'); }
        if (window.activeGame === 'snake') { if(k==='w'||k==='arrowup') window.changeSnakeDir(0,-1); if(k==='s'||k==='arrowdown') window.changeSnakeDir(0,1); if(k==='a'||k==='arrowleft') window.changeSnakeDir(-1,0); if(k==='d'||k==='arrowright') window.changeSnakeDir(1,0); }
        if (window.activeGame === 'breakout' && c === 'Space') if(window.breakoutStartBall) window.breakoutStartBall();
    });

    document.addEventListener('keyup', e => {
        let k = e.key.toLowerCase(), c = e.code;
        if(k==='w' || k==='arrowup') window.inputState.up = false; if(k==='s' || k==='arrowdown') window.inputState.down = false;
        if(k==='a' || k==='arrowleft') window.inputState.left = false; if(k==='d' || k==='arrowright') window.inputState.right = false;
        if(c==='Space') window.inputState.action = false;
    });

    // ==========================================
    // 🌟 遊戲執行緒控制 (終極防卡頓) 🌟
    // ==========================================
    window.stopAllGames = function() {
        if(window.currentGameLoop) { cancelAnimationFrame(window.currentGameLoop); window.currentGameLoop = null; }
        if(window.currentGameTimer) { clearTimeout(window.currentGameTimer); window.currentGameTimer = null; }
        for(let k in window.inputState) window.inputState[k] = false;
    };

    window.switchGame = function(e, id) {
        if(e) { document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active')); e.currentTarget.classList.add('active'); }
        document.querySelectorAll('.game-panel').forEach(el => el.classList.remove('active')); document.getElementById(`game-${id}`).classList.add('active');
        window.activeGame = id; window.stopAllGames();
        if(document.getElementById(`setup-${id}`)) { document.getElementById(`setup-${id}`).style.display = 'flex'; document.getElementById(`play-${id}`).classList.remove('active'); }
    };

    window.startGame = function(id) { 
        document.getElementById(`setup-${id}`).style.display='none'; document.getElementById(`play-${id}`).classList.add('active'); 
        window.stopAllGames(); window['init_'+id](); 
    };

    window.backToSetup = function(id) { window.stopAllGames(); document.getElementById(`play-${id}`).classList.remove('active'); document.getElementById(`setup-${id}`).style.display='flex'; };
    window.getVal = function(g, p) { return parseFloat(document.getElementById(`cfg-${g}-${p}`).value); };

    // ==========================================
    // 1. Clicker 全站連擊 (Firebase)
    // ==========================================
    let clickDebounce = false; const clickDocRef = doc(db, "arcade_games", "global_clicker");
    async function initClickerSync() { const snap = await getDoc(clickDocRef); if(!snap.exists()) { await setDoc(clickDocRef, { total: 0 }); } onSnapshot(clickDocRef, (doc) => { if(doc.exists()) { let el = document.getElementById('clicker-score'); el.innerText = doc.data().total.toLocaleString(); el.style.transform='scale(1.1)'; setTimeout(()=>el.style.transform='scale(1)', 100); } }); }
    window.doClick = function(e) {
        if(clickDebounce) return; clickDebounce = true; setTimeout(() => clickDebounce = false, 50);
        const particle = document.createElement('div'); particle.style.position = 'absolute'; particle.style.color = '#fff'; particle.style.fontSize = '2em'; particle.style.fontWeight = '900'; particle.style.pointerEvents = 'none'; particle.innerText = '+1'; particle.style.left = `${(e.clientX || window.innerWidth/2) - 10}px`; particle.style.top = `${(e.clientY || window.innerHeight/2) - 20}px`; document.body.appendChild(particle); particle.animate([{opacity:1, transform:'translateY(0) scale(1)'}, {opacity:0, transform:'translateY(-150px) scale(1.5)'}], {duration: 800, easing: 'ease-out'}).onfinish = () => particle.remove();
        if(db) getDoc(clickDocRef).then(d => { updateDoc(clickDocRef, { total: (d.exists() ? d.data().total : 0) + 1 }); });
    };

    // ==========================================
    // 2. TicTacToe (完美支援 WASD 與 2-4 人)
    // ==========================================
    window.tttR = 0; window.tttC = 0;
    const tttSyms = ['X', 'O', 'T', 'S']; const tttLbls = ['X', 'O', '△', '□'];
    
    window.renderTttBoard = function(arr, size) {
        const board = document.getElementById('ttt-board'); board.style.gridTemplateColumns = `repeat(${size}, 1fr)`; board.innerHTML = '';
        for(let i=0; i<size*size; i++) {
            let val = arr[i] || ""; let dVal = val; if(val==='T') dVal='△'; if(val==='S') dVal='□';
            let cls = val==='X'?'x':(val==='O'?'o':(val==='△'?'t':(val==='□'?'s':'')));
            let isFocus = (i === window.tttR * size + window.tttC) ? 'focused' : '';
            board.innerHTML += `<div class="ttt-cell ${cls} ${isFocus}" onclick="window.tttR=Math.floor(${i}/${size}); window.tttC=${i}%${size}; window.actionTttCursor();" style="font-size: ${size>5?'1.5em':'2.5em'};">${dVal}</div>`;
        }
    };

    window.moveTttCursor = function(dr, dc) { let size = window.getVal('tictactoe', 'size'); window.tttR = Math.max(0, Math.min(size-1, window.tttR + dr)); window.tttC = Math.max(0, Math.min(size-1, window.tttC + dc)); window.renderTttBoard(window.tttLocalBoard, size); };
    window.actionTttCursor = function() { let size = window.getVal('tictactoe', 'size'); window.playTttMove(window.tttR * size + window.tttC); };

    window.init_tictactoe = function() {
        let size = window.getVal('tictactoe', 'size'); let pCount = window.getVal('tictactoe', 'p');
        window.tttLocalBoard = Array(size*size).fill(""); window.tttActivePlayers = tttSyms.slice(0, pCount); window.tttLocalTurnIdx = 0; window.tttLocalStatus = "playing"; window.tttR = Math.floor(size/2); window.tttC = Math.floor(size/2);
        document.getElementById('ttt-status').innerText = `👉 輪到 ${tttLbls[window.tttLocalTurnIdx]}`; document.getElementById('ttt-board').classList.add('active'); document.getElementById('ttt-restart-btn').style.display = 'none';
        window.renderTttBoard(window.tttLocalBoard, size);
    };
    
    window.playTttMove = function(idx) {
        let size = window.getVal('tictactoe', 'size'); let winReq = window.getVal('tictactoe', 'win');
        if(window.tttLocalStatus !== "playing" || window.tttLocalBoard[idx] !== "") return;
        window.tttLocalBoard[idx] = window.tttActivePlayers[window.tttLocalTurnIdx];
        window.tttLocalStatus = checkTttWin(window.tttLocalBoard, size, winReq);
        if(window.tttLocalStatus === "playing") window.tttLocalTurnIdx = (window.tttLocalTurnIdx + 1) % window.tttActivePlayers.length;
        window.renderTttBoard(window.tttLocalBoard, size);
        let stEl = document.getElementById('ttt-status');
        if(window.tttLocalStatus === 'playing') stEl.innerText = `👉 輪到 ${tttLbls[window.tttLocalTurnIdx]}`; 
        else { document.getElementById('ttt-board').classList.remove('active'); document.getElementById('ttt-restart-btn').style.display = 'block'; if(window.tttLocalStatus === 'draw') stEl.innerText = "🤝 平手！"; else { let wSym = window.tttLocalStatus.split('_')[0]; let i = tttSyms.indexOf(wSym); stEl.innerText = `🏆 ${tttLbls[i]} 贏了！`; } }
    };

    function checkTttWin(b, size, streak) { function checkLine(dr, dc) { for(let r=0; r<size; r++) { for(let c=0; c<size; c++) { let v = b[r*size+c]; if(!v) continue; let ok = true; for(let i=1; i<streak; i++) { let nr=r+dr*i, nc=c+dc*i; if(nr<0||nr>=size||nc<0||nc>=size || b[nr*size+nc]!==v) { ok=false; break; } } if(ok) return v; }} return null; } let w = checkLine(0,1) || checkLine(1,0) || checkLine(1,1) || checkLine(1,-1); if(w) return w + "_won"; if(!b.includes("")) return "draw"; return "playing"; }

    // ==========================================
    // 3. Catch
    // ==========================================
    window.init_catch = function() {
        const cvs = document.getElementById('catch-canvas'); const ctx = cvs.getContext('2d');
        let speed = window.getVal('catch', 'speed'); let pSpeed = window.getVal('catch', 'pspeed'); let bombRate = window.getVal('catch', 'bomb') / 100; let genW = window.getVal('catch', 'range'); let pW = window.getVal('catch', 'width');
        let pX = 200, score = 0, lives = 3, items = [], isOver = false;
        function loop() {
            if(isOver) return;
            if(window.inputState.left && pX > pW/2) pX -= pSpeed; if(window.inputState.right && pX < 400-pW/2) pX += pSpeed;
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 400, 500);
            if(Math.random() < 0.04) items.push({ x: 200 + (Math.random()-0.5)*genW, y: 0, isBomb: Math.random() < bombRate });
            for(let i=items.length-1; i>=0; i--) { let it = items[i]; it.y += speed; ctx.fillStyle = it.isBomb ? '#ff1744' : '#1db954'; ctx.beginPath(); ctx.arc(it.x, it.y, 10, 0, Math.PI*2); ctx.fill(); if(it.y > 440 && it.y < 460 && Math.abs(it.x - pX) < pW/2 + 10) { if(it.isBomb) { lives--; document.getElementById('catch-lives').innerText=lives; if(lives<=0) isOver=true; } else { score++; document.getElementById('catch-score').innerText=score; } items.splice(i, 1); } else if(it.y > 500) items.splice(i, 1); }
            ctx.fillStyle = '#ffb300'; ctx.fillRect(pX - pW/2, 450, pW, 15); window.currentGameLoop = requestAnimationFrame(loop);
        }
        document.getElementById('catch-score').innerText=0; document.getElementById('catch-lives').innerText=3; window.currentGameLoop = requestAnimationFrame(loop);
    };

    // ==========================================
    // 4. Neon
    // ==========================================
    window.init_neon = function() {
        const cvs = document.getElementById('neon-canvas'); const ctx = cvs.getContext('2d');
        let speed = window.getVal('neon', 'speed'); let pSpeed = window.getVal('neon', 'pspeed'); let spawnRate = window.getVal('neon', 'spawn') / 100; let bSize = window.getVal('neon', 'size');
        let pX = 200, score = 0, blocks = [], isOver = false;
        function loop() {
            if(isOver) return;
            if(window.inputState.left && pX > 30) pX -= pSpeed; if(window.inputState.right && pX < 370) pX += pSpeed;
            ctx.fillStyle = 'rgba(5, 5, 5, 0.4)'; ctx.fillRect(0, 0, 400, 500);
            if(Math.random() < spawnRate) blocks.push({ x: Math.random()*400, y: 200, z: 100 });
            ctx.fillStyle = '#ff1744'; 
            for(let i=blocks.length-1; i>=0; i--) { let b = blocks[i]; b.z -= speed; if(b.z <= 0) { blocks.splice(i,1); score++; document.getElementById('neon-score').innerText=score; continue; } let scale = 100 / b.z; let projX = (b.x - 200) * scale + 200; let projY = (b.y - 250) * scale + 250 + (100 - b.z)*1.5; let size = bSize * scale; ctx.fillRect(projX - size/2, projY - size/2, size, size); if(b.z < 10 && Math.abs(projX - pX) < size/2 + 15 && projY > 400 && projY < 450) isOver = true; }
            ctx.fillStyle = '#00d4ff'; ctx.beginPath(); ctx.moveTo(pX, 400); ctx.lineTo(pX - 20, 440); ctx.lineTo(pX + 20, 440); ctx.fill(); window.currentGameLoop = requestAnimationFrame(loop);
        }
        document.getElementById('neon-score').innerText = 0; window.currentGameLoop = requestAnimationFrame(loop);
    };

    // ==========================================
    // 5. Snake
    // ==========================================
    window.init_snake = function() {
        const cvs = document.getElementById('snake-canvas'); const ctx = cvs.getContext('2d');
        let speedInterval = window.getVal('snake', 'speed'); const grid = 20; let snake = [{x: 10, y: 10}]; let food = {x: 15, y: 15}; window.sDx = 1; window.sDy = 0; let score = 0;
        window.changeSnakeDir = function(dx, dy) { if(window.sDx === -dx || window.sDy === -dy) return; window.sDx = dx; window.sDy = dy; };
        function loop() {
            let head = { x: snake[0].x + window.sDx, y: snake[0].y + window.sDy };
            if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) return;
            snake.unshift(head); if(head.x === food.x && head.y === food.y) { score++; document.getElementById('snake-score').innerText = score; food = { x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20) }; } else snake.pop();
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 400, 400); ctx.fillStyle = '#ff1744'; ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2); ctx.fillStyle = '#1db954'; snake.forEach(s => ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2));
            window.currentGameTimer = setTimeout(loop, speedInterval);
        }
        document.getElementById('snake-score').innerText = 0; window.currentGameTimer = setTimeout(loop, speedInterval);
    };

    // ==========================================
    // 6. Mine (完美 WASD)
    // ==========================================
    window.init_mine = function() {
        let w = window.getVal('mine','w'); let h = window.getVal('mine','h'); let mC = window.getVal('mine','c');
        const g = document.getElementById('mine-board'); g.style.gridTemplateColumns = `repeat(${w}, 1fr)`; g.innerHTML=''; let f=mC; document.getElementById('mine-flags').innerText=f; let go=false; window.mineR=Math.floor(h/2); window.mineC=Math.floor(w/2); let s=new Set(), cells=[]; while(s.size<mC) s.add(Math.floor(Math.random()*w*h));
        for(let i=0;i<w*h;i++){ let c=document.createElement('div'); c.className='mine-cell'; c.id=`m-cell-${i}`; c.onclick=()=>window.actionMineCursor('reveal',i); c.oncontextmenu=(e)=>{e.preventDefault();window.actionMineCursor('flag',i);}; cells.push(c); g.appendChild(c); let count=0; if(!s.has(i)){let r=Math.floor(i/w), cc=i%w; for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc; if(nr>=0&&nr<h&&nc>=0&&nc<w&&s.has(nr*w+nc))count++;}}} c.dataset.count=count; c.dataset.mine=s.has(i); }
        window.moveMineCursor=function(dr,dc){if(go)return; document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.remove('focused'); window.mineR=Math.max(0,Math.min(h-1,window.mineR+dr)); window.mineC=Math.max(0,Math.min(w-1,window.mineC+dc)); document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.add('focused');};
        window.actionMineCursor=function(a,idx=null){if(go)return; let i=idx!==null?idx:(window.mineR*w+window.mineC); let c=cells[i]; if(a==='flag'){if(!c.classList.contains('revealed')){if(c.innerText==='🚩'){c.innerText='';f++;}else if(f>0){c.innerText='🚩';f--;} document.getElementById('mine-flags').innerText=f;}}else if(a==='reveal'){if(c.classList.contains('revealed')||c.innerText==='🚩')return; if(c.dataset.mine==='true'){c.innerText='💣';c.style.background='red';go=true;}else{c.classList.add('revealed');let cnt=parseInt(c.dataset.count);if(cnt>0){c.innerText=cnt;c.classList.add(`mine-c-${cnt}`);}if(cnt===0){let r=Math.floor(i/w),cc=i%w;for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc;if(nr>=0&&nr<h&&nc>=0&&nc<w)window.actionMineCursor('reveal',nr*w+nc);}}}}}};
        document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.add('focused');
    };

    // ==========================================
    // 7. Breakout
    // ==========================================
    window.breakoutStartBall = function() { window.ballActive = true; };
    window.init_breakout = function() {
        const cvs = document.getElementById('breakout-canvas'); const ctx = cvs.getContext('2d');
        let speed = window.getVal('breakout','speed'); let pSpeed = window.getVal('breakout','pspeed'); let pW = window.getVal('breakout','width'); let rC = window.getVal('breakout','row'); let cC = window.getVal('breakout','col');
        let pX = 200, bX = 200, bY = 430, dx = speed, dy = -speed, score = 0, isOver = false; window.ballActive = false;
        let bricks = []; let bW = 400/cC - 4; for(let r=0; r<rC; r++) { for(let c=0; c<cC; c++) { bricks.push({x: c*(bW+4)+2, y: r*20+30, w: bW, h: 15, status: 1}); } }
        function loop() {
            if(isOver) return;
            if(window.inputState.left && pX > pW/2) pX -= pSpeed; if(window.inputState.right && pX < 400-pW/2) pX += pSpeed;
            if(!window.ballActive) { bX = pX; bY = 430; } else { bX += dx; bY += dy; if(bX < 5 || bX > 395) dx = -dx; if(bY < 5) dy = -dy; if(bY > 440 && bY < 450 && bX > pX - pW/2 && bX < pX + pW/2) { dy = -dy; dx = ((bX - pX) / (pW/2)) * speed; } else if(bY > 500) isOver = true; }
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 400, 500);
            bricks.forEach(b => { if(b.status === 1) { if(bX > b.x && bX < b.x+b.w && bY > b.y && bY < b.y+b.h) { dy = -dy; b.status = 0; score+=10; document.getElementById('breakout-score').innerText = score; } else { ctx.fillStyle = '#b000ff'; ctx.fillRect(b.x, b.y, b.w, b.h); } }});
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bX, bY, 5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#00d4ff'; ctx.fillRect(pX - pW/2, 440, pW, 10);
            window.currentGameLoop = requestAnimationFrame(loop);
        }
        document.getElementById('breakout-score').innerText = 0; window.currentGameLoop = requestAnimationFrame(loop);
    };

    window.addEventListener('DOMContentLoaded', () => { let n = localStorage.getItem('dogfish_game_name'); if(n) { window.playerName = n; document.getElementById('name-modal').style.display='none'; document.getElementById('ui-name').innerText=n; document.getElementById('ui-avatar').innerText=n.charAt(0).toUpperCase(); if(db) initClickerSync(); } else { document.getElementById('name-modal').style.display='flex'; } });
  </script>
