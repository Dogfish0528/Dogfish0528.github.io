<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogfish Arcade | 終極遊戲大廳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1db954; --accent: #ff1744; --game-blue: #00d4ff; --game-yellow: #ffb300; font-family: 'Noto Sans TC', sans-serif; --font-pixel: 'Press Start 2P', cursive; }
    body { background: radial-gradient(circle at top, #1a0b12, #050505); background-attachment: fixed; color: #fff; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    a, button, input, select { outline: none; font-family: inherit; }
    ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    
    .navbar { height: 60px; background: rgba(10,10,10,0.95); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; flex-shrink: 0; }
    .logo { font-size: 1.2em; font-weight: 900; background: linear-gradient(90deg, #ff1744, #ffb300); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-home { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #555; padding: 6px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.2s; font-size: 0.9em; cursor:pointer;} .btn-home:hover { background: #fff; color: #000; }

    .lobby-container { display: flex; flex: 1; overflow: hidden; position: relative; }
    .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; flex-shrink: 0; z-index: 100; transition: left 0.3s ease; }
    .player-profile { padding: 0 20px 15px; border-bottom: 1px solid #333; margin-bottom: 10px; text-align: center; }
    .player-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; color: #000; }
    .menu-section { padding: 5px 20px; color: #555; font-size: 0.8em; font-weight: bold; margin-top: 10px; }
    .menu-item { padding: 10px 20px; color: #aaa; font-weight: bold; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; font-size:0.9em;}
    .menu-item:hover { background: #1a1a1a; color: #fff; } .menu-item.active { background: #222; color: #00d4ff; border-left-color: #00d4ff; }
    
    .game-area { flex: 1; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/cubes.png'); padding: 20px; }
    .game-panel { display: none; width: 100%; max-width: 800px; margin: 0 auto; animation: slideIn 0.3s ease; padding-bottom: 50px; } .game-panel.active { display: flex; flex-direction: column; align-items: center; }
    .setup-screen { display: flex; flex-direction: column; align-items: center; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .play-screen { display: none; flex-direction: column; align-items: center; width: 100%; } .play-screen.active { display: flex; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 900; font-size: 1em; cursor: pointer; transition: 0.2s; text-transform: uppercase; } .btn:active { transform: scale(0.95); }
    .btn-green { background: var(--primary); color: #000; } .btn-blue { background: var(--game-blue); color: #000; } .btn-red { background: var(--accent); color: #fff; }
    .input-box { background: #000; border: 2px solid #333; color: #fff; padding: 10px; font-size: 1em; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; } .input-box:focus { border-color: var(--game-blue); }
    
    #name-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    .name-box { background: #111; border: 2px solid #333; padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

    .game-title { font-family: var(--font-pixel); color: var(--game-blue); margin: 0 0 10px; font-size: 1.5em; text-shadow: 0 0 10px rgba(0,212,255,0.4); text-align: center;}
    .game-desc { color: #aaa; font-size: 0.85em; margin-bottom: 20px; text-align: center; line-height: 1.6; }
    .game-canvas { background: #050505; border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(0,212,255,0.1); width: 100%; max-width: 600px; margin: 0 auto; display: block; touch-action: none; }
    .game-score-board { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-pixel); margin-bottom: 10px; color: var(--game-yellow); width: 100%; max-width: 600px; font-size: 0.8em; }
    
    .custom-settings-panel { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 600px; box-sizing: border-box; display: none; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9em; color: #ccc; font-weight: bold; }
    .setting-row input[type="range"] { flex: 1; margin: 0 15px; accent-color: var(--game-blue); cursor: pointer; }
    .val-display { color: var(--game-yellow); width: 55px; text-align: right; font-family: monospace; font-size: 1.1em; background: #222; padding: 4px 6px; border-radius: 4px; border: 1px solid #444;}

    /* 🌟 專屬連線房間控制面板 🌟 */
    .room-setup-box { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 20px; width: 100%; max-width: 600px; margin-top: 15px; text-align: center; box-sizing: border-box;}
    .room-setup-box h3 { margin: 0 0 15px; color: #fff; font-size: 1.1em; }
    .room-active-info { background: rgba(0,212,255,0.1); border: 1px solid var(--game-blue); padding: 15px; border-radius: 8px; display: none; flex-direction: column; gap: 10px; margin-top: 15px; }

    /* 4人對戰條 */
    .vs-match-bar { width: 100%; max-width: 800px; background: rgba(0,0,0,0.8); border: 2px solid #444; border-radius: 8px; padding: 10px 20px; margin: 0 auto 15px; display: none; justify-content: space-around; align-items: center; box-sizing: border-box; font-family: var(--font-pixel); font-size: 0.85em; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .p-score { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .p-score .name { font-size: 0.7em; color: #888; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
    .p-score .pts { font-size: 1.4em; font-weight: bold; }
    .p1 .pts { color: var(--game-blue); } .p2 .pts { color: var(--accent); } .p3 .pts { color: var(--primary); } .p4 .pts { color: var(--game-yellow); }

    /* 遊戲獨立樣式壓縮 */
    .clicker-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; width: 100%; }
    .global-score { font-size: 4em; font-weight: 900; color: #ffb300; font-family: var(--font-pixel); margin-bottom: 40px; text-align: center; text-shadow: 0 0 30px rgba(255, 179, 0, 0.5); }
    .big-click-btn { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #ff1744, #8a001a); border: 8px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: 900; color: white; user-select: none; transition: 0.05s ease; margin: 0 auto; } .big-click-btn:active { transform: scale(0.9); }
    .ttt-board { display: grid; gap: 8px; width: 100%; max-width: 450px; aspect-ratio: 1/1; margin: 0 auto; opacity: 0.5; } .ttt-board.active { opacity: 1; }
    .ttt-cell { background: #222; border-radius: 8px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-family: var(--font-pixel); cursor: pointer; color: #fff; font-weight: 900; position: relative;}
    .ttt-cell.focused { outline: 4px solid var(--game-blue); outline-offset: -4px; z-index: 10; background: #333; box-shadow: 0 0 15px var(--game-blue);}
    .ttt-cell.x { color: var(--game-blue); text-shadow: 0 0 15px var(--game-blue); } .ttt-cell.o { color: var(--accent); text-shadow: 0 0 15px var(--accent); } .ttt-cell.t { color: #1db954; text-shadow: 0 0 15px #1db954; } .ttt-cell.s { color: #ffb300; text-shadow: 0 0 15px #ffb300; } 
    .mine-grid { display: grid; gap: 2px; background: #333; padding: 2px; border-radius: 4px; }
    .mine-cell { width: 30px; height: 30px; background: #666; display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: monospace; cursor: pointer; user-select: none; }
    .mine-cell.revealed { background: #222; box-shadow: inset 0 0 5px #000; } .mine-cell.focused { outline: 3px solid var(--game-blue); outline-offset: -3px; background: #888; z-index:10;}
    .mine-c-1 { color: #00d4ff; } .mine-c-2 { color: #1db954; } .mine-c-3 { color: #ff1744; }
    .g2048-grid { position: relative; background: #333; border-radius: 8px; width: 100%; max-width: 400px; aspect-ratio: 1/1; padding: 8px; box-sizing: border-box;}
    .g2048-cell { position: absolute; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: 900; color: #fff; font-family: monospace; transition: all 0.15s ease-in-out; }
    .chat-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 800px; background: #111; border: 1px solid #333; border-radius: 12px; overflow: hidden; height: 60vh; }
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .chat-msg .bubble { background: #222; padding: 10px 15px; border-radius: 12px; width: fit-content; max-width: 80%; border-left: 3px solid var(--primary); word-break: break-word; }
    .chat-msg.mine { align-items: flex-end; } .chat-msg.mine .bubble { background: rgba(29, 185, 84, 0.15); border-left: none; border-right: 3px solid var(--primary); }

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
    .toast { background: #fff; color: #000; padding: 12px 20px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <div id="name-modal">
      <div class="name-box">
          <h2 style="font-family: var(--font-pixel); color: var(--game-yellow); font-size: 1.1em; line-height: 1.5;">Dogfish Arcade</h2>
          <p style="color:#aaa; font-size: 0.9em; margin-bottom: 25px;">請輸入名稱以啟動大廳</p>
          <input type="text" id="player-name-input" class="input-box" placeholder="訪客顯示名稱" maxlength="15" autocomplete="off" onkeypress="if(event.key === 'Enter') window.savePlayerName()">
          <button class="btn btn-green" style="width: 100%; margin-top: 15px;" onclick="window.savePlayerName()">進入大廳</button>
      </div>
  </div>

  <div id="toast-container"></div>

  <div class="navbar">
      <div class="logo">ARCADE 競技場</div>
      <button class="btn-home" onclick="alert('請返回主站')">🔙 離開</button>
  </div>

  <div class="lobby-container">
      <div class="sidebar" id="sidebar">
          <div class="player-profile"><div class="player-avatar" id="ui-avatar">?</div><div class="player-name" id="ui-name">載入中</div><button style="background:transparent; border:1px solid #555; color:#aaa; border-radius:10px; padding:4px 10px; font-size:0.7em; margin-top:5px; cursor:pointer;" onclick="document.getElementById('name-modal').style.display='flex'">切換帳號</button></div>
          <div class="menu-section">連線社群</div>
          <div class="menu-item active" onclick="window.switchGame(event, 'clicker')">🖱️ 全站連擊</div>
          <div class="menu-item" onclick="window.switchGame(event, 'chat')">💬 大廳聊天</div>
          <div class="menu-section">遊戲庫 (支援單機/連線)</div>
          <div class="menu-item" onclick="window.switchGame(event, 'tictactoe')">⭕ 井字對戰</div>
          <div class="menu-item" onclick="window.switchGame(event, 'catch')">⚾ 像素接球</div>
          <div class="menu-item" onclick="window.switchGame(event, 'neon')">🚀 霓虹閃避</div>
          <div class="menu-item" onclick="window.switchGame(event, 'snake')">🐍 貪吃蛇</div>
          <div class="menu-item" onclick="window.switchGame(event, 'mine')">💣 踩地雷</div>
          <div class="menu-item" onclick="window.switchGame(event, 'breakout')">🧱 打磚塊</div>
          <div class="menu-item" onclick="window.switchGame(event, 'flappy')">🐦 飛鳥</div>
          <div class="menu-item" onclick="window.switchGame(event, 'shooter')">🛸 戰機</div>
          <div class="menu-item" onclick="window.switchGame(event, '2048')">🔢 滑塊 2048</div>
      </div>

      <div class="game-area">
          <!-- 🌟 4人對戰分數條 🌟 -->
          <div class="vs-match-bar" id="vs-match-score-bar">
              <div class="p-score p1"><span class="name" id="p1-name">P1</span><span class="pts" id="p1-score">0</span></div>
              <div class="p-score p2"><span class="name" id="p2-name">P2</span><span class="pts" id="p2-score">0</span></div>
              <div class="p-score p3" id="p3-box" style="display:none;"><span class="name" id="p3-name">P3</span><span class="pts" id="p3-score">0</span></div>
              <div class="p-score p4" id="p4-box" style="display:none;"><span class="name" id="p4-name">P4</span><span class="pts" id="p4-score">0</span></div>
          </div>

          <div id="game-container-wrapper" style="width: 100%; max-width: 800px;"></div>
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js"; 
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, serverTimestamp, collection, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyCPNG7FZNOXn-ZmbkysKmAaAeoqr5EImEI", authDomain: "dogfish-website.firebaseapp.com", projectId: "dogfish-website" }; 
    let app, db; try { app = initializeApp(firebaseConfig); db = getFirestore(app); } catch(e) {}

    window.playerName = "訪客"; window.activeGame = 'clicker';
    window.inputState = { up:false, down:false, left:false, right:false, action:false };
    window.activeRAF = null; window.activeTimer = null; 
    
    // 🌟 全新連線架構 🌟
    window.matchRoomId = null; window.myPlayerSlot = null; window.roomUnsubscribe = null; window.roomState = null;

    window.simpleToast = function(msg, type='success') { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerText = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000); };
    window.savePlayerName = function() { let i = document.getElementById('player-name-input').value.trim(); if(i) { window.playerName = i; document.getElementById('name-modal').style.display='none'; document.getElementById('ui-name').innerText=i; document.getElementById('ui-avatar').innerText=i.charAt(0).toUpperCase(); window.initGlobal(); } };

    // ==========================================
    // 🎮 遊戲與自訂選項資料庫
    // ==========================================
    const gamesConfig = {
        clicker: { title: "GLOBAL CLICKER", desc: "全球瘋狂點擊！", type: "html", custom: [] },
        tictactoe: { title: "TIC-TAC-TOE", desc: "支援 2-4 人，單機或連線。<br>【控制】: WASD 移動，空白鍵下棋", type: "html", custom: [ {id:'p', lbl:'遊玩人數 (2-4)', min:2, max:4, step:1, val:2}, {id:'size', lbl:'棋盤大小 (3-8)', min:3, max:8, step:1, val:3} ] },
        catch: { title: "PIXEL CATCH", desc: "接住綠球，避開紅炸彈。<br>【控制】: A/D 或 左右方向鍵", type: "canvas", custom: [ {id:'speed', lbl:'下落速度', min:2, max:20, step:1, val:4}, {id:'pspeed', lbl:'接板移速', min:5, max:40, step:1, val:16}, {id:'width', lbl:'接板寬度', min:30, max:200, step:10, val:80, unit:'px'}, {id:'bomb', lbl:'炸彈機率', min:0, max:80, step:5, val:15, unit:'%'}, {id:'range', lbl:'物品生成寬度', min:50, max:400, step:10, val:200, unit:'px'} ] },
        neon: { title: "NEON DODGE 3D", desc: "閃避迎面而來的紅色 3D 方塊。<br>【控制】: A/D 或 左右方向鍵", type: "canvas", custom: [ {id:'speed', lbl:'前進速度', min:2, max:30, step:1, val:5}, {id:'pspeed', lbl:'飛船移速', min:2, max:20, step:1, val:6}, {id:'spawn', lbl:'生成機率', min:1, max:50, step:1, val:5, unit:'%'}, {id:'size', lbl:'障礙物大小', min:10, max:100, step:5, val:25, unit:'px'} ] },
        snake: { title: "CLASSIC SNAKE", desc: "吃蘋果變長，不要撞牆。<br>【控制】: WASD 或 方向鍵", type: "canvas", custom: [ {id:'speed', lbl:'移動間距 (越小越快)', min:20, max:300, step:10, val:100, unit:'ms'} ] },
        mine: { title: "MINESWEEPER", desc: "掃雷。<br>【控制】: WASD 移動，空白鍵挖開，F鍵插旗", type: "html", custom: [ {id:'w', lbl:'棋盤寬度', min:5, max:30, step:1, val:10}, {id:'h', lbl:'棋盤高度', min:5, max:30, step:1, val:10}, {id:'c', lbl:'地雷總數', min:1, max:200, step:1, val:15} ] },
        breakout: { title: "BRICK BREAKER", desc: "打磚塊。<br>【控制】: A/D 移動，空白鍵發球", type: "canvas", custom: [ {id:'speed', lbl:'球速', min:2, max:20, step:1, val:5}, {id:'pspeed', lbl:'托板移速', min:5, max:30, step:1, val:10}, {id:'width', lbl:'托板寬度', min:30, max:200, step:10, val:80, unit:'px'} ] },
        flappy: { title: "FLAPPY BIRD", desc: "穿梭水管。<br>【控制】: 空白鍵跳躍", type: "canvas", custom: [ {id:'g', lbl:'重力向下引力', min:10, max:100, step:5, val:30}, {id:'j', lbl:'跳躍上升力', min:2, max:15, step:1, val:6}, {id:'gap', lbl:'水管通道間距', min:50, max:300, step:10, val:130, unit:'px'} ] },
        shooter: { title: "SPACE SHOOTER", desc: "射擊敵機。<br>【控制】: A/D 移動，空白鍵射擊", type: "canvas", custom: [ {id:'es', lbl:'敵機下落速度', min:1, max:15, step:1, val:3}, {id:'er', lbl:'敵機生成機率', min:1, max:20, step:1, val:3, unit:'%'} ] },
        2048: { title: "2048 PUZZLE", desc: "滑動合併數字。<br>【控制】: WASD 滑動", type: "html", custom: [ {id:'size', lbl:'網格大小 (N x N)', min:3, max:8, step:1, val:4} ] },
        chat: { title: "GLOBAL CHAT", desc: "世界廣播大廳", type: "html", custom: [] }
    };

    // 🌟 動態生成 UI 🌟
    function buildGamesHTML() {
        const wrap = document.getElementById('game-container-wrapper'); let html = '';
        for(let g in gamesConfig) {
            let conf = gamesConfig[g];
            html += `<div id="game-${g}" class="game-panel"><div class="setup-screen" id="setup-${g}"><h2 class="game-title">${conf.title}</h2><p class="game-desc">${conf.desc}</p>`;
            
            if(conf.custom.length > 0) {
                html += `<select id="mode-${g}" class="input-box" style="margin-bottom:15px; max-width:400px;" onchange="document.getElementById('custom-${g}').style.display=this.value==='custom'?'block':'none'"><option value="default">🟢 預設經典模式</option><option value="custom">🛠️ 自訂進階參數</option></select><div id="custom-${g}" class="custom-settings-panel">`;
                conf.custom.forEach(c => { html += `<div class="setting-row"><label>${c.lbl}</label><input type="range" id="cfg-${g}-${c.id}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.val}" oninput="this.nextElementSibling.innerText=this.value+'${c.unit||''}'"><span class="val-display">${c.val}${c.unit||''}</span></div>`; });
                html += `</div>`;
            }

            if(g !== 'clicker' && g !== 'chat') {
                html += `<button class="btn btn-green" style="width:100%; max-width:400px; margin-bottom:15px;" onclick="window.startLocalPlay('${g}')">🟩 單機直接遊玩</button>`;

    // --- TicTacToe (井字棋 - WASD 游標版) ---
    window.tttR = 0; window.tttC = 0;
    const tttMarks = {p1:'X', p2:'O', p3:'△', p4:'□'}; // 連線對應用
    const localSyms = ['X', 'O', '△', '□']; // 單機對應用
    
    window.renderTttBoard = function(arr, size) {
        const board = document.getElementById('ttt-board'); board.style.gridTemplateColumns = `repeat(${size}, 1fr)`; board.innerHTML = '';
        for(let i=0; i<size*size; i++) {
            let val = arr[i] || ""; let dVal = val; if(val==='T') dVal='△'; if(val==='S') dVal='□';
            let cls = val==='X'?'x':(val==='O'?'o':(val==='△'?'t':(val==='□'?'s':'')));
            let isFocus = (i === window.tttR * size + window.tttC) ? 'focused' : '';
            board.innerHTML += `<div class="ttt-cell ${cls} ${isFocus}" onclick="window.playTttMove(${i})" style="font-size: ${size>5?'1.5em':'2.5em'};">${dVal}</div>`;
        }
    };
    window.moveTttCursor = function(dr, dc) { let size = window.getParam('tictactoe', 'size'); window.tttR = Math.max(0, Math.min(size-1, window.tttR + dr)); window.tttC = Math.max(0, Math.min(size-1, window.tttC + dc)); let arr = window.matchRoomId ? window.roomState.board : window.tttLocalBoard; window.renderTttBoard(arr, size); };
    window.actionTttCursor = function() { let size = window.getParam('tictactoe', 'size'); window.playTttMove(window.tttR * size + window.tttC); };

    window.initTictactoe = function() { window.tttR = 0; window.tttC = 0; if(!window.matchRoomId) { let size = window.getParam('tictactoe', 'size'); window.tttLocalBoard = Array(size*size).fill(""); window.tttLocalTurn = 0; window.tttLocalStatus = "playing"; document.getElementById('ttt-status').innerText = `輪到 ${localSyms[0]}`; window.renderTttBoard(window.tttLocalBoard, size); } };
    window.hostRestartTtt = function() { window.hostStartGame('tictactoe'); };
    
    window.playTttMove = async function(idx) {
        let size = window.getParam('tictactoe', 'size');
        if(!window.matchRoomId) { // 單機
            if(window.tttLocalStatus !== 'playing' || window.tttLocalBoard[idx] !== "") return;
            window.tttLocalBoard[idx] = localSyms[window.tttLocalTurn]; window.tttLocalStatus = checkTttWin(window.tttLocalBoard, size, window.getParam('tictactoe', 'win')||3);
            if(window.tttLocalStatus === 'playing') window.tttLocalTurn = (window.tttLocalTurn+1) % window.getParam('tictactoe', 'p');
            window.renderTttBoard(window.tttLocalBoard, size);
            let st = document.getElementById('ttt-status');
            if(window.tttLocalStatus === 'playing') st.innerText = `輪到 ${localSyms[window.tttLocalTurn]}`;
            else { document.getElementById('ttt-restart-btn').style.display='block'; st.innerText = window.tttLocalStatus==='draw'?'平手':`🏆 ${window.tttLocalStatus.charAt(0)} 贏了`; }
        } else { // 連線
            let d = window.roomState; if(d.status !== 'playing' || d.turn !== window.myPlayerSlot || d.board[idx] !== "") return;
            let nb = [...d.board]; nb[idx] = tttMarks[window.myPlayerSlot]; let nStat = checkTttWin(nb, size, d.settings.win||3);
            let slots = Object.keys(d.players).sort(); let nextT = slots[(slots.indexOf(window.myPlayerSlot) + 1) % slots.length];
            await updateDoc(doc(db, "arcade_rooms", window.matchRoomId), { board: nb, turn: nextT, status: nStat==='playing'?'playing':(nStat==='draw'?'draw':window.myPlayerSlot+'_won') });
        }
    };
    function checkTttWin(b, size, streak) { function cL(dr, dc) { for(let r=0; r<size; r++) { for(let c=0; c<size; c++) { let v = b[r*size+c]; if(!v) continue; let ok = true; for(let i=1; i<streak; i++) { let nr=r+dr*i, nc=c+dc*i; if(nr<0||nr>=size||nc<0||nc>=size || b[nr*size+nc]!==v) { ok=false; break; } } if(ok) return v; }} return null; } let w = cL(0,1) || cL(1,0) || cL(1,1) || cL(1,-1); if(w) return w; if(!b.includes("")) return "draw"; return "playing"; }

    // --- Catch ---
    window.initCatch = function() {
        const cvs = document.getElementById('catch-canvas'); const ctx = cvs.getContext('2d');
        let s = window.getParam('catch', 'speed'); let ps = window.getParam('catch', 'pspeed'); let br = window.getParam('catch', 'bomb')/100; let gw = window.getParam('catch', 'range'); let pw = window.getParam('catch', 'width');
        let px = 200, sc = 0, lives = 3, items = [], over = false;
        function loop() {
            if(over) return; if(window.inputState.left && px > pw/2) px -= ps; if(window.inputState.right && px < 400-pw/2) px += ps;
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,400,500);
            if(Math.random()<0.04) items.push({x:200+(Math.random()-0.5)*gw, y:0, b:Math.random()<br});
            for(let i=items.length-1; i>=0; i--) { let it=items[i]; it.y+=s; ctx.fillStyle=it.b?'#ff1744':'#1db954'; ctx.beginPath(); ctx.arc(it.x,it.y,10,0,Math.PI*2); ctx.fill(); if(it.y>440 && it.y<460 && Math.abs(it.x-px)<pw/2+10) { if(it.b){lives--; document.getElementById('catch-lives').innerText=lives; if(lives<=0)over=true;} else {sc++; document.getElementById('catch-score').innerText=sc; window.uploadScore(sc);} items.splice(i,1); } else if(it.y>500) items.splice(i,1); }
            ctx.fillStyle = '#ffb300'; ctx.fillRect(px-pw/2, 450, pw, 15); window.activeRAF = requestAnimationFrame(loop);
        }
        document.getElementById('catch-score').innerText=0; document.getElementById('catch-lives').innerText=3; window.activeRAF = requestAnimationFrame(loop);

    // --- Neon ---
    window.initNeon = function() {
        const cvs = document.getElementById('neon-canvas'); const ctx = cvs.getContext('2d');
        let s = window.getParam('neon', 'speed'); let ps = window.getParam('neon', 'pspeed'); let sr = window.getParam('neon', 'spawn')/100; let bSize = window.getParam('neon', 'size');
        let px = 200, sc = 0, blocks = [], over = false;
        function loop() {
            if(over) return; if(window.inputState.left && px > 30) px -= ps; if(window.inputState.right && px < 370) px += ps;
            ctx.fillStyle = 'rgba(5,5,5,0.4)'; ctx.fillRect(0,0,400,500);
            if(Math.random()<sr) blocks.push({x:Math.random()*400, y:200, z:100});
            ctx.fillStyle='#ff1744'; for(let i=blocks.length-1; i>=0; i--) { let b=blocks[i]; b.z-=s; if(b.z<=0){blocks.splice(i,1); sc++; document.getElementById('neon-score').innerText=sc; window.uploadScore(sc); continue;} let sca=100/b.z; let prX=(b.x-200)*sca+200; let prY=(b.y-250)*sca+250+(100-b.z)*1.5; let sz=bSize*sca; ctx.fillRect(prX-sz/2, prY-sz/2, sz, sz); if(b.z<10 && Math.abs(prX-px)<sz/2+15 && prY>400 && prY<450) over=true; }
            ctx.fillStyle='#00d4ff'; ctx.beginPath(); ctx.moveTo(px,400); ctx.lineTo(px-20,440); ctx.lineTo(px+20,440); ctx.fill(); window.activeRAF = requestAnimationFrame(loop);
        }
        document.getElementById('neon-score').innerText=0; window.activeRAF = requestAnimationFrame(loop);
    };

    // --- Snake ---
    window.initSnake = function() {
        const cvs = document.getElementById('snake-canvas'); const ctx = cvs.getContext('2d');
        let sInt = window.getParam('snake', 'speed'); const grid = 20; let snake = [{x:10,y:10}]; let food = {x:15,y:15}; window.sDx=1; window.sDy=0; let sc = 0;
        window.changeSnakeDir = function(dx, dy) { if(window.sDx === -dx || window.sDy === -dy) return; window.sDx = dx; window.sDy = dy; };
        function loop() {
            let h = {x:snake[0].x+window.sDx, y:snake[0].y+window.sDy}; if(h.x<0||h.x>=20||h.y<0||h.y>=20||snake.some(s=>s.x===h.x&&s.y===h.y)) return;
            snake.unshift(h); if(h.x===food.x && h.y===food.y) { sc++; document.getElementById('snake-score').innerText=sc; window.uploadScore(sc); food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}; } else snake.pop();
            ctx.fillStyle='#050505'; ctx.fillRect(0,0,400,400); ctx.fillStyle='#ff1744'; ctx.fillRect(food.x*grid,food.y*grid,grid-2,grid-2); ctx.fillStyle='#1db954'; snake.forEach(s=>ctx.fillRect(s.x*grid,s.y*grid,grid-2,grid-2));
            window.activeTimer = setTimeout(loop, sInt);
        }
        document.getElementById('snake-score').innerText=0; window.activeTimer = setTimeout(loop, sInt);
    };

    // --- Mine ---
    window.initMine = function() {
        let w = window.getParam('mine','w'); let h = window.getParam('mine','h'); let mC = window.getParam('mine','c');
        const g = document.getElementById('mine-grid'); g.style.gridTemplateColumns = `repeat(${w}, 1fr)`; g.innerHTML=''; let f=mC; document.getElementById('mine-flags').innerText=f; let go=false; window.mineR=0; window.mineC=0; let s=new Set(), cells=[]; while(s.size<mC) s.add(Math.floor(Math.random()*w*h));
        for(let i=0;i<w*h;i++){ let c=document.createElement('div'); c.className='mine-cell'; c.id=`m-cell-${i}`; c.onclick=()=>window.actionMineCursor('reveal',i); c.oncontextmenu=(e)=>{e.preventDefault();window.actionMineCursor('flag',i);}; cells.push(c); g.appendChild(c); let count=0; if(!s.has(i)){let r=Math.floor(i/w), cc=i%w; for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc; if(nr>=0&&nr<h&&nc>=0&&nc<w&&s.has(nr*w+nc))count++;}}} c.dataset.count=count; c.dataset.mine=s.has(i); }
        window.moveMineCursor=function(dr,dc){if(go)return; document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.remove('focused'); window.mineR=Math.max(0,Math.min(h-1,window.mineR+dr)); window.mineC=Math.max(0,Math.min(w-1,window.mineC+dc)); document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.add('focused');};
        window.actionMineCursor=function(a,idx=null){if(go)return; let i=idx!==null?idx:(window.mineR*w+window.mineC); let c=cells[i]; if(a==='flag'){if(!c.classList.contains('revealed')){if(c.innerText==='🚩'){c.innerText='';f++;}else if(f>0){c.innerText='🚩';f--;} document.getElementById('mine-flags').innerText=f;}}else if(a==='reveal'){if(c.classList.contains('revealed')||c.innerText==='🚩')return; if(c.dataset.mine==='true'){c.innerText='💣';c.style.background='red';go=true;}else{c.classList.add('revealed');let cnt=parseInt(c.dataset.count);if(cnt>0){c.innerText=cnt;c.classList.add(`mine-c-${cnt}`);}if(cnt===0){let r=Math.floor(i/w),cc=i%w;for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc;if(nr>=0&&nr<h&&nc>=0&&nc<w)window.actionMineCursor('reveal',nr*w+nc);}}}}}};
        document.getElementById(`m-cell-0`).classList.add('focused');
    };

    // --- Breakout ---
    window.initBreakout = function() {
        const cvs = document.getElementById('breakout-canvas'); const ctx = cvs.getContext('2d');
        let s = window.getParam('breakout','bspeed'); let ps = window.getParam('breakout','pspeed'); let pw = window.getParam('breakout','width'); let rC = window.getParam('breakout','row'); let cC = window.getParam('breakout','col');
        let px = 200, bx = 200, by = 430, dx = s, dy = -s, sc = 0, over = false; window.ballActive = false; window.breakoutStartBall = function() { window.ballActive = true; };
        let bricks = []; let bw = 400/cC - 4; for(let r=0; r<rC; r++) { for(let c=0; c<cC; c++) { bricks.push({x: c*(bw+4)+2, y: r*20+30, w: bw, h: 15, st: 1}); } }
        function loop() {
            if(over) return; if(window.inputState.left && px > pw/2) px -= ps; if(window.inputState.right && px < 400-pw/2) px += ps;
            if(!window.ballActive) { bx = px; by = 430; } else { bx += dx; by += dy; if(bx < 5 || bx > 395) dx = -dx; if(by < 5) dy = -dy; if(by > 440 && by < 450 && bx > px - pw/2 && bx < px + pw/2) { dy = -dy; dx = ((bx - px) / (pw/2)) * s; } else if(by > 500) over = true; }
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,400,500);
            bricks.forEach(b => { if(b.st === 1) { if(bx > b.x && bx < b.x+b.w && by > b.y && by < b.y+b.h) { dy = -dy; b.st = 0; sc+=10; document.getElementById('breakout-score').innerText=sc; window.uploadScore(sc); } else { ctx.fillStyle = '#b000ff'; ctx.fillRect(b.x, b.y, b.w, b.h); } }});
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#00d4ff'; ctx.fillRect(px - pw/2, 440, pw, 10); window.activeRAF = requestAnimationFrame(loop);
        }
        document.getElementById('breakout-score').innerText = 0; window.activeRAF = requestAnimationFrame(loop);
    };

    // --- Flappy ---
    window.initFlappy = function() {
        const cvs = document.getElementById('flappy-canvas'); const ctx = cvs.getContext('2d');
        let g = window.getParam('flappy','g')/100; let j = window.getParam('flappy','j'); let gap = window.getParam('flappy','gap'); let s = window.getParam('flappy','s');
        window.birdY = 250; window.birdVy = 0; let sc = 0, frames = 0, pipes = [], over = false; window.flappyJump = function() { window.birdVy = -j; };
        function loop() {
            if(over) return; window.birdVy += g; window.birdY += window.birdVy; if(window.birdY > 480 || window.birdY < 0) over = true;
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 400, 500);
            if(frames % Math.floor(150/s) === 0) { let t = Math.random() * (350 - gap) + 50; pipes.push({ x: 400, w: 40, top: t, bot: t + gap }); }
            ctx.fillStyle = '#1ed760';
            for(let i=pipes.length-1; i>=0; i--) { let p = pipes[i]; p.x -= s; ctx.fillRect(p.x, 0, p.w, p.top); ctx.fillRect(p.x, p.bot, p.w, 500 - p.bot); if(50 > p.x && 50 < p.x+p.w && (window.birdY < p.top || window.birdY > p.bot)) over = true; if(p.x === 50) { sc++; document.getElementById('flappy-score').innerText=sc; window.uploadScore(sc); } if(p.x < -50) pipes.splice(i, 1); }
            ctx.fillStyle = '#ffb300'; ctx.fillRect(50, window.birdY, 20, 20); frames++; window.activeRAF = requestAnimationFrame(loop);
        }
        document.getElementById('flappy-score').innerText = 0; window.activeRAF = requestAnimationFrame(loop);
    };

    // --- Shooter ---
    window.initShooter = function() {
        const cvs = document.getElementById('shooter-canvas'); const ctx = cvs.getContext('2d');
        let es = window.getParam('shooter','es'); let er = window.getParam('shooter','er')/100; let ps = window.getParam('shooter','ps'); let bs = window.getParam('shooter','bs');
        window.shooterPx = 200; window.bullets = []; let enemies = [], sc = 0, over = false; window.shooterFire = function() { window.bullets.push({x: window.shooterPx, y: 430}); };
        function loop() {
            if(over) return; if(window.inputState.left && window.shooterPx > 20) window.shooterPx -= ps; if(window.inputState.right && window.shooterPx < 380) window.shooterPx += ps;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 400, 500); ctx.fillStyle = '#fff'; for(let i=0; i<5; i++) { ctx.fillRect(Math.random()*400, Math.random()*500, 2, 2); }
            if(Math.random() < er) enemies.push({ x: Math.random()*360+20, y: -20 });
            ctx.fillStyle = '#ffb300'; for(let i=window.bullets.length-1; i>=0; i--) { let b = window.bullets[i]; b.y -= bs; ctx.fillRect(b.x-2, b.y, 4, 10); if(b.y < 0) window.bullets.splice(i, 1); }
            ctx.fillStyle = '#ff1744';
            for(let i=enemies.length-1; i>=0; i--) {
                let e = enemies[i]; e.y += es; ctx.beginPath(); ctx.moveTo(e.x, e.y+10); ctx.lineTo(e.x-15, e.y-10); ctx.lineTo(e.x+15, e.y-10); ctx.fill();
                for(let j=window.bullets.length-1; j>=0; j--) { let b = window.bullets[j]; if(Math.abs(b.x - e.x) < 15 && Math.abs(b.y - e.y) < 15) { enemies.splice(i, 1); window.bullets.splice(j, 1); sc+=10; document.getElementById('shooter-score').innerText=sc; window.uploadScore(sc); break; } }
                if(e.y > 440 && Math.abs(window.shooterPx - e.x) < 20) over = true;
            }
            ctx.fillStyle = '#00d4ff'; ctx.beginPath(); ctx.moveTo(window.shooterPx, 420); ctx.lineTo(window.shooterPx-20, 450); ctx.lineTo(window.shooterPx+20, 450); ctx.fill(); window.activeRAF = requestAnimationFrame(loop);
        }
        document.getElementById('shooter-score').innerText = 0; window.activeRAF = requestAnimationFrame(loop);
    };

    // --- 2048 ---
    window.init2048 = function() {
        let size = window.getParam('2048', 'size'); let b = Array(size*size).fill(0); let sc = 0;
        const grid = document.getElementById('g2048-grid'); grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`; grid.innerHTML = ''; let cells = [];
        for(let i=0; i<size*size; i++) { let bg = document.createElement('div'); bg.style.background='#222'; bg.style.borderRadius='6px'; grid.appendChild(bg); let c = document.createElement('div'); c.className = 'g2048-cell'; c.style.width=`calc(100% / ${size} - 8px)`; c.style.height=`calc(100% / ${size} - 8px)`; cells.push(c); grid.appendChild(c); }

        function addTile() { let emp = []; b.forEach((v,i)=>{if(v===0) emp.push(i)}); if(emp.length>0) b[emp[Math.floor(Math.random()*emp.length)]] = Math.random()<0.9?2:4; }
        function draw() {
            window.uploadScore(sc);
            for(let i=0; i<size*size; i++) {
                let v = b[i]; let c = cells[i]; let r = Math.floor(i/size), col = i%size;
                c.style.top = `calc(${r} * (100% / ${size}) + 4px)`; c.style.left = `calc(${col} * (100% / ${size}) + 4px)`;
                let color = '#222'; let tColor = '#fff';
                if(v===2) color='#eee4da', tColor='#000'; else if(v===4) color='#ede0c8', tColor='#000'; else if(v===8) color='#f2b179'; else if(v===16) color='#f59563'; else if(v===32) color='#f67c5f'; else if(v===64) color='#f65e3b'; else if(v>=128) color='#edcf72';
                c.style.background = v>0 ? color : 'transparent'; c.style.color = tColor; c.innerText = v>0 ? v : '';
            }
            document.getElementById('2048-score').innerText = sc;
        }
        
        window.slide2048 = function(dir) {
            let moved = false;
            function op(row) { let arr = row.filter(v=>v!==0); for(let i=0; i<arr.length-1; i++) { if(arr[i]===arr[i+1]) { arr[i]*=2; sc+=arr[i]; arr.splice(i+1,1); arr.push(0); } } while(arr.length < size) arr.push(0); return arr; }
            if(dir==='left'||dir==='a'||dir==='ArrowLeft') { for(let r=0; r<size; r++) { let row=[]; for(let c=0; c<size; c++) row.push(b[r*size+c]); let newRow=op(row); for(let c=0; c<size; c++) { if(b[r*size+c]!==newRow[c]) moved=true; b[r*size+c]=newRow[c]; } } }
            if(dir==='right'||dir==='d'||dir==='ArrowRight') { for(let r=0; r<size; r++) { let row=[]; for(let c=0; c<size; c++) row.push(b[r*size+c]); row.reverse(); let newRow=op(row); newRow.reverse(); for(let c=0; c<size; c++) { if(b[r*size+c]!==newRow[c]) moved=true; b[r*size+c]=newRow[c]; } } }
            if(dir==='up'||dir==='w'||dir==='ArrowUp') { for(let c=0; c<size; c++) { let col=[]; for(let r=0; r<size; r++) col.push(b[r*size+c]); let newCol=op(col); for(let r=0; r<size; r++) { if(b[r*size+c]!==newCol[r]) moved=true; b[r*size+c]=newCol[r]; } } }
            if(dir==='down'||dir==='s'||dir==='ArrowDown') { for(let c=0; c<size; c++) { let col=[]; for(let r=0; r<size; r++) col.push(b[r*size+c]); col.reverse(); let newCol=op(col); newCol.reverse(); for(let r=0; r<size; r++) { if(b[r*size+c]!==newCol[r]) moved=true; b[r*size+c]=newCol[r]; } } }
            if(moved) { addTile(); draw(); }
        };
        addTile(); addTile(); draw();
    };

    window.addEventListener('DOMContentLoaded', () => { window.initGames(); });
  </script>
