<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogfish AudioCast | 遠端音訊廣播系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1db954; --game-blue: #00d4ff; --accent: #ff1744; --font-main: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; }
    * { font-family: var(--font-main) !important; box-sizing: border-box; }
    body { background: radial-gradient(circle at top, #1a0b12, #050505); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
    button, input { outline: none; }
    
    .navbar { width: 100%; height: 60px; background: rgba(10,10,10,0.9); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0; backdrop-filter: blur(10px); }
    .logo { font-size: 1.2em; font-weight: 900; background: linear-gradient(90deg, #1db954, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-nav-back { color: #aaa; text-decoration: none; font-weight: bold; border: 1px solid #555; padding: 6px 16px; border-radius: 20px; transition: 0.2s; font-size: 0.9em; cursor: pointer; background: transparent;} .btn-nav-back:hover { background: #fff; color: #000; }
    
    .main-panel { background: rgba(20,20,20,0.85); border: 1px solid #333; border-radius: 16px; padding: 30px; margin-top: 40px; width: 90%; max-width: 500px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); text-align: center; backdrop-filter: blur(10px); }
    .title { color: var(--game-blue); margin: 0 0 10px 0; font-size: 1.8em; font-weight: 900; text-shadow: 0 0 10px rgba(0,212,255,0.3); }
    .desc { color: #aaa; font-size: 0.9em; margin-bottom: 25px; line-height: 1.6; }

    .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 900; font-size: 1.1em; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 15px; text-transform: uppercase; } .btn:active { transform: scale(0.95); }
    .btn-green { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(29,185,84,0.4); } .btn-green:hover { background: #1ed760; }
    .btn-blue { background: var(--game-blue); color: #000; box-shadow: 0 4px 15px rgba(0,212,255,0.4); } .btn-blue:hover { background: #33e0ff; }
    .btn-red { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(255,23,68,0.4); } .btn-red:hover { background: #ff4060; }
    
    .input-box { background: #000; border: 2px solid #333; color: #fff; padding: 12px; font-size: 1.3em; border-radius: 8px; width: 100%; text-align: center; margin-bottom: 15px; letter-spacing: 3px; font-weight: bold; transition: 0.2s; } .input-box:focus { border-color: var(--game-blue); }

    .status-panel { background: rgba(0,0,0,0.4); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
    .room-code-display { font-size: 3em; font-weight: 900; letter-spacing: 8px; color: #fff; margin: 10px 0; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
    
    .control-row { display: flex; justify-content: space-between; align-items: center; width: 100%; background: #000; border: 1px solid #333; padding: 12px 15px; border-radius: 8px; margin-bottom: 12px; }
    .control-row label { font-weight: bold; font-size: 0.95em; color: #ccc; }
    .control-row input[type="range"] { width: 55%; accent-color: var(--game-blue); cursor: pointer; }
    .val-lbl { color: var(--game-yellow); font-family: monospace; font-size: 1.1em; width: 45px; text-align: right; }

    .visualizer-canvas { width: 100%; height: 70px; background: #050505; border-radius: 8px; margin-top: 15px; border: 1px solid #222; }

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
    .toast { background: #fff; color: #000; padding: 12px 20px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: toastIn 0.3s ease; }
    .toast.error { background: var(--accent); color: white; }
    @keyframes toastIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body>

  <div class="navbar">
      <div class="logo">AudioCast Pro</div>
      <button class="btn-nav-back" onclick="window.location.href='index.html'">🔙 返回網站大廳</button>
  </div>

  <div id="toast-container"></div>

  <div class="main-panel" id="setup-panel">
      <h2 class="title">即時音訊對講系統</h2>
      <p class="desc">一端設定為麥克風發送，另一端設定為喇叭播放。<br>本機玩、跨設備皆支援，連線即時同步中斷。</p>

      <div style="background: rgba(255,255,255,0.02); border: 1px solid #222; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
          <h3 style="margin-top:0; font-size:1.05em; color:var(--primary); text-align:left;">🎙️ 廣播發送端</h3>
          <button class="btn btn-green" onclick="createAudioRoom()">建立房間 (當作麥克風)</button>
      </div>

      <div style="background: rgba(255,255,255,0.02); border: 1px solid #222; padding: 20px; border-radius: 10px;">
          <h3 style="margin-top:0; font-size:1.05em; color:var(--game-blue); text-align:left;">🔊 廣播接收端</h3>
          <input type="text" id="room-id-input" class="input-box" placeholder="請輸入 6 碼房號" maxlength="6">
          <button class="btn btn-blue" onclick="joinAudioRoom()">加入房間 (當作喇叭)</button>
      </div>
  </div>

  <div class="main-panel" id="active-panel" style="display: none;">
      <h2 class="title" id="active-panel-title">語音連線中</h2>
      
      <div class="status-panel">
          <span style="color: #888; font-weight: bold; font-size: 0.85em;">ROOM CODE</span>
          <div class="room-code-display" id="display-room-code">------</div>
          <span id="txt-connection-status" style="color: var(--game-yellow); font-weight: bold; font-size: 0.95em;">等待連線建立...</span>
          <canvas id="canvas-visualizer" class="visualizer-canvas"></canvas>
      </div>

      <div style="width:100%; margin-bottom: 20px;">
          <div class="control-row" id="ctrl-volume-row" style="display:none;">
              <label>🔊 喇叭音量</label>
              <input type="range" id="volume-slider" min="0" max="200" value="100" oninput="window.changeVolume(this.value)">
              <span class="val-lbl" id="lbl-vol-val">100%</span>
          </div>
          <button class="btn btn-blue" id="btn-mic-mute" style="display:none; margin-bottom:12px;" onclick="window.toggleMicMute()">🎙️ 麥克風發音中：點擊靜音</button>
          <button class="btn" id="btn-fx-filter" style="background:#222; color:#fff; border:1px solid #444;" onclick="window.toggleVoiceFilter()">📻 無線電變音特效：已關閉</button>
      </div>

      <audio id="remote-audio" autoplay playsinline muted style="display:none;"></audio>
      <button class="btn btn-red" onclick="window.hangUp(true)">❌ 結束並掛斷通話</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js"; 
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    
    const firebaseConfig = { apiKey: "AIzaSyCPNG7FZNOXn-ZmbkysKmAaAeoqr5EImEI", authDomain: "dogfish-website.firebaseapp.com", projectId: "dogfish-website" }; 
    let app, db; 
    try { app = initializeApp(firebaseConfig); db = getFirestore(app); } catch(e) { alert("Firebase 初始化失敗：" + e.message); }

    let peerConnection = null; let localStream = null; let roomId = null; let role = null; 
    let roomUnsubscribe = null; let iceUnsubscribe = null;
    let audioCtx = null; let audioSource = null; let gainNode = null; let filterNode = null; let analyserNode = null; let isFilterActive = false;
    let animationId = null;

    const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    window.simpleToast = function(msg, isError = false) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = isError ? 'toast error' : 'toast'; t.innerText = msg; 
        c.appendChild(t); setTimeout(() => t.remove(), 3500);
    };

    // 🌟 1. 建立房間 (麥克風端) - 增強除錯防護罩
    window.createAudioRoom = async function() {
        try {
            if(!db) throw new Error("Firebase 尚未連線，請檢查網路！");
            
            window.simpleToast("正在請求麥克風權限，請點擊「允許」...");

            // 1. 先取得權限
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            window.simpleToast("✅ 麥克風已就緒");
            
            // 2. 切換 UI 面板
            role = 'mic';
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('active-panel').style.display = 'block';
            document.getElementById('active-panel-title').innerText = '🎙️ 語音發送端 (麥克風)';
            document.getElementById('btn-mic-mute').style.display = 'block';
            document.getElementById('ctrl-volume-row').style.display = 'none';
            document.getElementById('txt-connection-status').innerText = "正在建立房間...";

            // 3. 確保房號產生 (防禦之前的雷點)
            roomId = Math.floor(100000 + Math.random() * 900000).toString();
            const codeDisplay = document.getElementById('display-room-code');
            if(!codeDisplay) throw new Error("找不到房號顯示元素 (HTML ID錯誤)");
            codeDisplay.innerText = roomId;

            // 4. 啟動音訊引擎 (包裝起來防報錯)
            try { initAudioEngine(localStream, true); } catch(err) { console.error("音訊特效引擎錯誤:", err); }

            // 5. Firebase RTC 連線
            const roomRef = doc(db, 'audio_rooms', roomId);
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if (event.candidate) addDoc(collection(roomRef, 'micCandidates'), event.candidate.toJSON());
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp }, status: "waiting", timestamp: serverTimestamp() });

            document.getElementById('txt-connection-status').innerText = "等待接收端加入...";

            // 6. 監聽對方加入或掛斷
            roomUnsubscribe = onSnapshot(roomRef, async snap => {
                if(!snap.exists()) return;
                const data = snap.data();
                if(data.status === "hungup") { window.simpleToast("👥 對方已切斷連線！"); window.hangUp(false); return; }
                if (!peerConnection.currentRemoteDescription && data.answer) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('txt-connection-status').innerText = "🟢 廣播中！遠端喇叭正在收聽";
                    document.getElementById('txt-connection-status').style.color = "var(--primary)";
                }
            });

            iceUnsubscribe = onSnapshot(collection(roomRef, 'speakerCandidates'), snap => {
                snap.docChanges().forEach(async c => { if (c.type === 'added') await peerConnection.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
            });

        } catch (err) {
            alert("系統錯誤: " + err.message); // 極端防護：彈出原生警告視窗
            window.simpleToast("❌ 建立失敗: " + err.message, true);
            window.hangUp(false);
        }
    };

    // 🌟 2. 加入房間 (喇叭端)
    window.joinAudioRoom = async function() {
        try {
            if(!db) throw new Error("Firebase 尚未連線！");
            roomId = document.getElementById('room-id-input').value.trim();
            if(roomId.length !== 6) { window.simpleToast("請輸入完整的 6 碼房號", true); return; }

            const roomRef = doc(db, 'audio_rooms', roomId);
            const snap = await getDoc(roomRef);
            if(!snap.exists()) { window.simpleToast("房間不存在，請確認代碼！", true); return; }

            role = 'speaker';
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('active-panel').style.display = 'block';
            document.getElementById('active-panel-title').innerText = '🔊 語音接收端 (喇叭)';
            document.getElementById('ctrl-volume-row').style.display = 'flex';
            document.getElementById('btn-mic-mute').style.display = 'none';
            document.getElementById('display-room-code').innerText = roomId;
            document.getElementById('txt-connection-status').innerText = "正在建立連線...";

            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.onicecandidate = event => {
                if (event.candidate) addDoc(collection(roomRef, 'speakerCandidates'), event.candidate.toJSON());
            };

            peerConnection.ontrack = event => {
                document.getElementById('remote-audio').srcObject = event.streams[0];
                document.getElementById('txt-connection-status').innerText = "🟢 連線成功！即時播放中";
                document.getElementById('txt-connection-status').style.color = "var(--primary)";
                window.simpleToast("✅ 已成功接通麥克風！");
                try { initAudioEngine(event.streams[0], false); } catch(e) {}
            };

            const offer = snap.data().offer;
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await updateDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp }, status: "connected" });

            roomUnsubscribe = onSnapshot(roomRef, snap => {
                if(snap.exists() && snap.data().status === "hungup") { window.simpleToast("👥 麥克風發送端已關閉！"); window.hangUp(false); }
            });

            iceUnsubscribe = onSnapshot(collection(roomRef, 'micCandidates'), snap => {
                snap.docChanges().forEach(async c => { if (c.type === 'added') await peerConnection.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
            });

        } catch(err) {
            alert("系統錯誤: " + err.message);
            window.simpleToast("❌ 加入失敗: " + err.message, true);
            window.hangUp(false);
        }
    };

    // 🌟 3. 核心特效引擎
    function initAudioEngine(stream, isLocal) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
        audioSource = audioCtx.createMediaStreamSource(stream);
        analyserNode = audioCtx.createAnalyser(); analyserNode.fftSize = 256;
        gainNode = audioCtx.createGain(); gainNode.gain.value = 1.0;
        filterNode = audioCtx.createBiquadFilter(); filterNode.type = 'lowpass'; filterNode.frequency.value = 850;

        audioSource.connect(gainNode);
        gainNode.connect(analyserNode);
        if (!isLocal) analyserNode.connect(audioCtx.destination);
        startVisualizer();
    }

    window.changeVolume = function(val) {
        if (gainNode) gainNode.gain.value = val / 100;
        document.getElementById('lbl-vol-val').innerText = val + '%';
    };

    window.toggleMicMute = function() {
        if (!localStream) return;
        let track = localStream.getAudioTracks()[0]; track.enabled = !track.enabled;
        let btn = document.getElementById('btn-mic-mute');
        if (track.enabled) { btn.innerText = "🎙️ 麥克風發音中：點擊靜音"; btn.style.background = "var(--primary)"; } 
        else { btn.innerText = "🔇 麥克風已靜音：點擊發音"; btn.style.background = "var(--accent)"; }
    };

    window.toggleVoiceFilter = function() {
        if (!audioSource || !gainNode || !filterNode || !analyserNode) return;
        isFilterActive = !isFilterActive;
        let btn = document.getElementById('btn-fx-filter');
        audioSource.disconnect(); filterNode.disconnect();
        if (isFilterActive) { audioSource.connect(filterNode); filterNode.connect(gainNode); btn.innerText = "📻 無線電變音特效：開啟中"; btn.style.background = "var(--primary)"; btn.style.color = "#000"; } 
        else { audioSource.connect(gainNode); btn.innerText = "📻 無線電變音特效：已關閉"; btn.style.background = "#222"; btn.style.color = "#fff"; }
    };

    window.hangUp = async function(shouldNotifyCloud = true) {
        if (shouldNotifyCloud && roomId && db) { try { await updateDoc(doc(db, 'audio_rooms', roomId), { status: "hungup" }); } catch(e) {} }
        if(peerConnection) { peerConnection.close(); peerConnection = null; }
        if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        if(roomUnsubscribe) { roomUnsubscribe(); roomUnsubscribe = null; }
        if(iceUnsubscribe) { iceUnsubscribe(); iceUnsubscribe = null; }
        if(animationId) { cancelAnimationFrame(animationId); animationId = null; }

        audioSource = null; gainNode = null; filterNode = null; analyserNode = null; isFilterActive = false;
        document.getElementById('remote-audio').srcObject = null;
        document.getElementById('active-panel').style.display = 'none';
        document.getElementById('setup-panel').style.display = 'block';
        document.getElementById('txt-connection-status').innerText = "等待連線建立...";
        document.getElementById('txt-connection-status').style.color = "var(--game-yellow)";
        document.getElementById('btn-fx-filter').style.background = "#222"; document.getElementById('btn-fx-filter').style.color = "#fff";
        
        const canvas = document.getElementById('canvas-visualizer');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        window.simpleToast("連線已掛斷");
    };

    function startVisualizer() {
        const canvas = document.getElementById('canvas-visualizer');
        const ctx = canvas.getContext('2d');
        const bufferLength = analyserNode.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function drawFrame() {
            if(!analyserNode) return; 
            animationId = requestAnimationFrame(drawFrame);
            analyserNode.getByteFrequencyData(dataArray);
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / bufferLength) * 2.2;
            let barHeight; let x = 0;
            for(let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 2.5;
                ctx.fillStyle = `rgb(0, 212, 255)`; 
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
        drawFrame();
    }
  </script>
</body>
</html>
