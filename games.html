<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogfish Arcade | 終極遊戲大廳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1db954; --accent: #ff1744; --game-blue: #00d4ff; --game-yellow: #ffb300; font-family: 'Noto Sans TC', sans-serif; --font-pixel: 'Press Start 2P', cursive; }
    body { background: radial-gradient(circle at top, #1a0b12, #050505); background-attachment: fixed; color: #fff; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    a, button, input, select { outline: none; font-family: inherit; }
    ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    
    .navbar { height: 60px; background: rgba(10,10,10,0.95); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; flex-shrink: 0; }
    .logo { font-size: 1.2em; font-weight: 900; background: linear-gradient(90deg, #ff1744, #ffb300); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-home { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #555; padding: 6px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.2s; font-size: 0.9em; cursor:pointer;} .btn-home:hover { background: #fff; color: #000; }

    .lobby-container { display: flex; flex: 1; overflow: hidden; position: relative; }
    .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; flex-shrink: 0; z-index: 100; transition: left 0.3s ease; }
    .player-profile { padding: 0 20px 15px; border-bottom: 1px solid #333; margin-bottom: 10px; text-align: center; }
    .player-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; color: #000; }
    .player-name { font-size: 1.2em; font-weight: 900; color: #fff; word-break: break-all;}
    .menu-section { padding: 5px 20px; color: #555; font-size: 0.8em; font-weight: bold; margin-top: 10px; }
    .menu-item { padding: 10px 20px; color: #aaa; font-weight: bold; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; font-size:0.9em;}
    .menu-item:hover { background: #1a1a1a; color: #fff; } .menu-item.active { background: #222; color: #00d4ff; border-left-color: #00d4ff; }
    
    .game-area { flex: 1; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/cubes.png'); padding: 20px; }
    .game-panel { display: none; width: 100%; max-width: 800px; margin: 0 auto; animation: slideIn 0.3s ease; padding-bottom: 50px; } .game-panel.active { display: flex; flex-direction: column; align-items: center; }
    .setup-screen { display: flex; flex-direction: column; align-items: center; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .play-screen { display: none; flex-direction: column; align-items: center; width: 100%; } .play-screen.active { display: flex; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* 元件 */
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 900; font-size: 1em; cursor: pointer; transition: 0.2s; text-transform: uppercase; } .btn:active { transform: scale(0.95); }
    .btn-green { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(29,185,84,0.4); } .btn-green:hover { background: #1ed760; }
    .btn-blue { background: var(--game-blue); color: #000; box-shadow: 0 4px 15px rgba(0,212,255,0.4); } .btn-blue:hover { background: #33e0ff; }
    .btn-red { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(255,23,68,0.4); } .btn-red:hover { background: #ff4060; }
    .input-box { background: #000; border: 2px solid #333; color: #fff; padding: 10px; font-size: 1em; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; } .input-box:focus { border-color: var(--game-blue); }
    
    #name-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    .name-box { background: #111; border: 2px solid #333; padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

    /* 遊戲共用 UI */
    .game-title { font-family: var(--font-pixel); color: var(--game-blue); margin: 0 0 10px; font-size: 1.5em; text-shadow: 0 0 10px rgba(0,212,255,0.4); text-align: center;}
    .game-desc { color: #aaa; font-size: 0.85em; margin-bottom: 20px; text-align: center; line-height: 1.6; }
    .game-canvas { background: #050505; border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(0,212,255,0.1); width: 100%; max-width: 600px; margin: 0 auto; display: block; touch-action: none; }
    .game-score-board { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-pixel); margin-bottom: 10px; color: var(--game-yellow); width: 100%; max-width: 600px; font-size: 0.8em; }
    
    /* 🌟 全新動態生成的自訂參數面板 🌟 */
    .custom-settings-panel { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 100%; box-sizing: border-box; display: none; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9em; color: #ccc; font-weight: bold; }
    .setting-row input[type="range"] { flex: 1; margin: 0 15px; accent-color: var(--game-blue); cursor: pointer; }
    .val-display { color: var(--game-yellow); width: 55px; text-align: right; font-family: monospace; font-size: 1.1em; background: #222; padding: 4px 6px; border-radius: 4px; border: 1px solid #444;}

    /* 遊戲獨立樣式 */
    .big-click-btn { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #ff1744, #8a001a); border: 8px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: 900; color: white; user-select: none; transition: 0.05s ease; margin: 0 auto; } .big-click-btn:active { transform: scale(0.9); }
    
    .ttt-board { display: grid; gap: 8px; width: 100%; max-width: 450px; aspect-ratio: 1/1; margin: 0 auto; opacity: 0.5; } .ttt-board.active { opacity: 1; }
    .ttt-cell { background: #222; border-radius: 8px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-family: var(--font-pixel); cursor: pointer; color: #fff; font-weight: 900; position: relative;}
    .ttt-cell.focused { outline: 4px solid var(--game-blue); outline-offset: -4px; z-index: 10; background: #333; box-shadow: 0 0 15px var(--game-blue);}
    .ttt-cell.x { color: var(--game-blue); text-shadow: 0 0 15px var(--game-blue); } .ttt-cell.o { color: var(--accent); text-shadow: 0 0 15px var(--accent); } .ttt-cell.t { color: #1db954; text-shadow: 0 0 15px #1db954; } .ttt-cell.s { color: #ffb300; text-shadow: 0 0 15px #ffb300; } 

    .mine-grid { display: grid; gap: 2px; background: #333; padding: 2px; border-radius: 4px; }
    .mine-cell { width: 25px; height: 25px; background: #666; display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: monospace; cursor: pointer; user-select: none; }
    .mine-cell.revealed { background: #222; box-shadow: inset 0 0 5px #000; } .mine-cell.focused { outline: 3px solid var(--game-blue); outline-offset: -3px; background: #888; z-index:10;}
    .mine-c-1 { color: #00d4ff; } .mine-c-2 { color: #1db954; } .mine-c-3 { color: #ff1744; }

    .g2048-grid { position: relative; background: #333; border-radius: 8px; width: 100%; max-width: 400px; aspect-ratio: 1/1; padding: 8px; box-sizing: border-box; }
    .g2048-cell { position: absolute; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.8em; font-weight: 900; color: #fff; font-family: monospace; transition: all 0.1s ease-in-out; }

    .chat-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 800px; background: #111; border: 1px solid #333; border-radius: 12px; overflow: hidden; height: 60vh; }
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .chat-msg .bubble { background: #222; padding: 10px 15px; border-radius: 12px; width: fit-content; max-width: 80%; border-left: 3px solid var(--primary); word-break: break-word; }
    .chat-msg.mine { align-items: flex-end; } .chat-msg.mine .bubble { background: rgba(29, 185, 84, 0.15); border-left: none; border-right: 3px solid var(--primary); }

    /* 對戰條與廣播 */
    .vs-match-bar { width: 100%; max-width: 600px; background: linear-gradient(90deg, rgba(0,212,255,0.1), rgba(255,23,68,0.1)); border: 2px dashed #555; border-radius: 8px; padding: 12px; margin: 0 auto 15px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; font-family: var(--font-pixel); font-size: 0.85em; }
    .btn-spectate { background: rgba(0,212,255,0.1); border: 1px solid var(--game-blue); color: var(--game-blue); padding: 4px 10px; border-radius: 4px; font-size: 0.8em; cursor: pointer; transition: 0.2s; font-weight: bold; margin-right:10px;} .btn-spectate.active { background: var(--game-blue); color: #000; box-shadow: 0 0 10px rgba(0,212,255,0.5); }
    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
    .toast { background: #fff; color: #000; padding: 12px 20px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <div id="name-modal">
      <div class="name-box">
          <h2 style="font-family: var(--font-pixel); color: var(--game-yellow); font-size: 1.1em; line-height: 1.5;">Dogfish Arcade</h2>
          <p style="color:#aaa; font-size: 0.9em; margin-bottom: 25px;">請輸入名稱以啟動大廳</p>
          <input type="text" id="player-name-input" class="input-box" placeholder="訪客顯示名稱" maxlength="15" autocomplete="off" onkeypress="if(event.key === 'Enter') window.savePlayerName()">
          <button class="btn btn-green" style="width: 100%; margin-top: 15px;" onclick="window.savePlayerName()">進入大廳</button>
      </div>
  </div>

  <div id="toast-container"></div>

  <div class="navbar">
      <div class="logo">ARCADE 競技場</div>
      <button class="btn-home" onclick="alert('獨立運作版，如需返回請修改超連結')">🔙 離開</button>
  </div>

  <div class="lobby-container">
      <!-- 側邊欄 -->
      <div class="sidebar" id="sidebar">
          <div class="player-profile"><div class="player-avatar" id="ui-avatar">?</div><div class="player-name" id="ui-name">載入中</div><button style="background:transparent; border:1px solid #555; color:#aaa; border-radius:10px; padding:4px 10px; font-size:0.7em; margin-top:5px; cursor:pointer;" onclick="document.getElementById('name-modal').style.display='flex'">切換帳號</button></div>
          
          <div style="background: rgba(0,0,0,0.4); padding: 15px; margin: 0 15px 15px; border-radius: 8px; border: 1px solid #333;">
              <span style="color:#00d4ff; font-size:0.8em; font-weight:bold; display:block; margin-bottom:8px;">⚔️ 雙人連線比賽控制</span>
              <button class="btn btn-blue" style="width:100%; font-size:0.8em; padding:8px; margin-bottom:8px;" onclick="window.createMatchRoom()">➕ 建立比賽房間</button>
              <div style="display:flex; gap:5px;"><input type="text" id="match-room-input" class="input-box" placeholder="6碼代號" style="padding:6px; font-size:0.85em;"><button class="btn btn-green" style="font-size:0.8em; padding:6px 12px;" onclick="window.joinMatchRoom()">加入</button></div>
              <div id="vs-room-active-info" style="display:none; margin-top:10px; font-size:0.8em; color:var(--game-purple); font-weight:bold; text-align:center;"></div>
          </div>

          <div style="background: rgba(0,0,0,0.4); padding: 15px; margin: 0 15px 15px; border-radius: 8px; border: 1px solid #333;">
              <span style="color:var(--game-yellow); font-size:0.8em; font-weight:bold; display:block; margin-bottom:8px;">📺 觀戰大廳 (Live)</span>
              <div id="spectate-list" style="font-size: 0.8em; color: #888;">目前無人直播...</div>
          </div>

          <div class="menu-section">連線社群</div>
          <div class="menu-item active" onclick="window.switchGame(event, 'clicker')">🖱️ 全球連擊大戰</div>
          <div class="menu-item" onclick="window.switchGame(event, 'chat')">💬 大廳世界廣播</div>
          <div class="menu-item" onclick="window.switchGame(event, 'tictactoe')">⭕ 井字棋 (2-4人)</div>
          
          <div class="menu-section">經典挑戰 (支援WASD)</div>
          <div class="menu-item" onclick="window.switchGame(event, 'catch')">⚾ 像素接球</div>
          <div class="menu-item" onclick="window.switchGame(event, 'neon')">🚀 3D霓虹閃避</div>
          <div class="menu-item" onclick="window.switchGame(event, 'snake')">🐍 經典貪吃蛇</div>
          <div class="menu-item" onclick="window.switchGame(event, 'mine')">💣 經典踩地雷</div>
          <div class="menu-item" onclick="window.switchGame(event, 'breakout')">🧱 磚塊破壞者</div>
          <div class="menu-item" onclick="window.switchGame(event, 'flappy')">🐦 像素飛鳥</div>
          <div class="menu-item" onclick="window.switchGame(event, 'shooter')">🛸 宇宙戰機</div>
          <div class="menu-item" onclick="window.switchGame(event, '2048')">🔢 2048滑塊</div>
      </div>

      <!-- 右側遊戲區 -->
      <div class="game-area">
          <div class="vs-match-bar" id="vs-match-score-bar"><span style="color:var(--game-blue);" id="vs-p1-label">P1: 0</span><span style="color:var(--game-yellow);">VS</span><span style="color:var(--accent);" id="vs-p2-label">P2: 0</span></div>

          <!-- HTML骨架由 JS 動態填入以節省空間並避免截斷 -->
          <div id="game-container-wrapper" style="width: 100%; max-width: 800px;"></div>
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js"; 
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, serverTimestamp, collection, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyCPNG7FZNOXn-ZmbkysKmAaAeoqr5EImEI", authDomain: "dogfish-website.firebaseapp.com", projectId: "dogfish-website" }; 
    let app, db; try { app = initializeApp(firebaseConfig); db = getFirestore(app); } catch(e) {}

    // 🌟 全域引擎變數 🌟
    window.playerName = "訪客"; window.activeGame = 'clicker';
    window.inputState = { up:false, down:false, left:false, right:false, action:false }; // 統一輸入引擎
    window.activeRAF = null; window.activeTimer = null; 
    window.isBroadcasting = false; window.framesCount = 0;
    window.matchRoomId = null; window.matchPlayerRole = null; let matchUnsubscribe = null;

    window.simpleToast = function(msg, type='success') { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerText = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000); };
    window.savePlayerName = function() { let i = document.getElementById('player-name-input').value.trim(); if(i) { window.playerName = i; document.getElementById('name-modal').style.display='none'; document.getElementById('ui-name').innerText=i; document.getElementById('ui-avatar').innerText=i.charAt(0).toUpperCase(); window.initGames(); } };

    // ==========================================
    // 🎮 遊戲與自訂選項資料庫 (解決選項太少問題)
    // ==========================================
    const gamesConfig = {
        clicker: { title: "GLOBAL CLICKER", desc: "瘋狂點擊！(全域同步)<br>【控制】: 滑鼠點擊 或 鍵盤空白鍵", type: "html", custom: [ {id:'score', lbl:'單次點擊加分', min:1, max:100, step:1, val:1}, {id:'size', lbl:'按鈕大小', min:100, max:300, step:10, val:200, unit:'px'} ] },
        tictactoe: { title: "TIC-TAC-TOE", desc: "支援 2-4 人，線上開房或單機。<br>【控制】: WASD 移動游標，空白鍵下棋！", type: "html", custom: [ {id:'p', lbl:'遊玩人數 (2-4)', min:2, max:4, step:1, val:2}, {id:'size', lbl:'棋盤大小 (3-8)', min:3, max:8, step:1, val:3}, {id:'win', lbl:'勝利連線數 (3-5)', min:3, max:5, step:1, val:3} ] },
        catch: { title: "PIXEL CATCH", desc: "接住綠球，避開紅炸彈。<br>【控制】: WASD 或 方向鍵左右移動", type: "canvas", custom: [ {id:'speed', lbl:'下落速度', min:2, max:20, step:1, val:4}, {id:'pspeed', lbl:'接板移速', min:5, max:40, step:1, val:16}, {id:'width', lbl:'接板寬度', min:30, max:200, step:10, val:80, unit:'px'}, {id:'bomb', lbl:'炸彈機率', min:0, max:80, step:5, val:15, unit:'%'}, {id:'range', lbl:'物品生成寬度', min:50, max:400, step:10, val:200, unit:'px'} ] },
        neon: { title: "NEON DODGE 3D", desc: "閃避迎面而來的紅色 3D 方塊。<br>【控制】: WASD 或 方向鍵左右移動", type: "canvas", custom: [ {id:'speed', lbl:'障礙物前進速度', min:2, max:30, step:1, val:5}, {id:'pspeed', lbl:'飛船移動速度', min:2, max:20, step:1, val:6}, {id:'spawn', lbl:'生成機率', min:1, max:50, step:1, val:5, unit:'%'}, {id:'size', lbl:'障礙物基礎大小', min:10, max:100, step:5, val:25, unit:'px'} ] },
        snake: { title: "CLASSIC SNAKE", desc: "吃蘋果變長，不要撞牆。<br>【控制】: WASD 或 方向鍵上下左右", type: "canvas", custom: [ {id:'speed', lbl:'移動間距(毫秒,越小越快)', min:20, max:300, step:10, val:100, unit:'ms'}, {id:'food', lbl:'食物加分', min:1, max:20, step:1, val:1}, {id:'init', lbl:'初始長度', min:1, max:20, step:1, val:1} ] },
        mine: { title: "MINESWEEPER", desc: "掃雷遊戲。<br>【控制】: WASD 移動游標，空白鍵挖開，F鍵插旗", type: "html", custom: [ {id:'w', lbl:'棋盤寬度', min:5, max:30, step:1, val:10}, {id:'h', lbl:'棋盤高度', min:5, max:30, step:1, val:10}, {id:'c', lbl:'地雷總數', min:1, max:200, step:1, val:15} ] },
        breakout: { title: "BRICK BREAKER", desc: "打磚塊。<br>【控制】: WASD 左右移動，空白鍵發球", type: "canvas", custom: [ {id:'bspeed', lbl:'球速', min:2, max:20, step:1, val:5}, {id:'pspeed', lbl:'托板移速', min:5, max:30, step:1, val:10}, {id:'width', lbl:'托板寬度', min:30, max:200, step:10, val:80, unit:'px'}, {id:'row', lbl:'磚塊行數', min:1, max:10, step:1, val:4}, {id:'col', lbl:'磚塊列數', min:3, max:12, step:1, val:8} ] },
        flappy: { title: "FLAPPY BIRD", desc: "穿梭水管。<br>【控制】: 空白鍵 或 W鍵跳躍", type: "canvas", custom: [ {id:'g', lbl:'重力向下引力', min:10, max:100, step:5, val:30}, {id:'j', lbl:'跳躍上升力', min:2, max:15, step:1, val:6}, {id:'gap', lbl:'水管通道間距', min:50, max:300, step:10, val:130, unit:'px'}, {id:'s', lbl:'水管移動速度', min:1, max:15, step:1, val:3} ] },
        shooter: { title: "SPACE SHOOTER", desc: "射擊敵機。<br>【控制】: WASD 左右移動，空白鍵射擊", type: "canvas", custom: [ {id:'es', lbl:'敵機下落速度', min:1, max:15, step:1, val:3}, {id:'er', lbl:'敵機生成機率', min:1, max:20, step:1, val:3, unit:'%'}, {id:'ps', lbl:'玩家移動速度', min:2, max:20, step:1, val:6}, {id:'bs', lbl:'子彈飛行速度', min:5, max:30, step:1, val:10} ] },
        2048: { title: "2048 PUZZLE", desc: "滑動合併數字。<br>【控制】: WASD 或 方向鍵滑動", type: "html", custom: [ {id:'size', lbl:'網格大小 (N x N)', min:3, max:8, step:1, val:4} ] },
        chat: { title: "GLOBAL CHAT", desc: "世界廣播大廳", type: "html", custom: [] }
    };

    // 🌟 動態生成 HTML 以節省空間並提供海量自訂 🌟
    function buildGamesHTML() {
        const wrap = document.getElementById('game-container-wrapper');
        let html = '';
        for(let g in gamesConfig) {

        if(!tttRoomId || tttPlayerRole === null) return; const roomRef = doc(db, "arcade_ttt_rooms", tttRoomId); const snap = await getDoc(roomRef); const data = snap.data(); 
        if(data.status !== "playing" || data.turnIdx !== tttPlayerRole || data.board[idx] !== "") return; 
        let newBoard = [...data.board]; newBoard[idx] = tttSyms[tttPlayerRole]; let newStatus = checkTttWin(newBoard, data.size, data.winReq || 3); let nextTurn = (data.turnIdx + 1) % data.pCount;
        await updateDoc(roomRef, { board: newBoard, turnIdx: nextTurn, status: newStatus, lastUpdated: serverTimestamp() }); 
    };
    window.resetTttBoard = async function() { if (window.tttMode === 'local') { window.startLocalTtt(); return; } if(!tttRoomId) return; const snap = await getDoc(doc(db, "arcade_ttt_rooms", tttRoomId)); const d = snap.data(); await updateDoc(doc(db, "arcade_ttt_rooms", tttRoomId), { board: Array(d.size*d.size).fill(""), status: "playing", turnIdx: 0 }); };
    function checkTttWin(b, size, streak) { 
        function checkLine(dr, dc) { for(let r=0; r<size; r++) { for(let c=0; c<size; c++) { let v = b[r*size+c]; if(!v) continue; let ok = true; for(let i=1; i<streak; i++) { let nr=r+dr*i, nc=c+dc*i; if(nr<0||nr>=size||nc<0||nc>=size || b[nr*size+nc]!==v) { ok=false; break; } } if(ok) return v; }} return null; }
        let w = checkLine(0,1) || checkLine(1,0) || checkLine(1,1) || checkLine(1,-1); if(w) return w + "_won"; if(!b.includes("")) return "draw"; return "playing";
    }

    // ==========================================

                if(it.y > 440 && it.y < 460 && Math.abs(it.x - pX) < pW/2 + 10) { if(it.isBomb) { lives--; document.getElementById('catch-lives').innerText=lives; if(lives<=0) isOver=true; } else { score++; document.getElementById('catch-score').innerText=score; window.broadcastData(score); } items.splice(i, 1); } else if(it.y > 500) items.splice(i, 1);

        let pX = 200, score = 0, blocks = [], isOver = false; window.framesCount=0;
        function loop() {

            if(Math.random() < spawnRate) blocks.push({ x: Math.random()*400, y: 200, z: 100 });
            ctx.fillStyle = '#ff1744'; 
            for(let i=blocks.length-1; i>=0; i--) { let b = blocks[i]; b.z -= speed; if(b.z <= 0) { blocks.splice(i,1); score++; document.getElementById('neon-score').innerText=score; window.broadcastData(score); continue; } let scale = 100 / b.z; let projX = (b.x - 200) * scale + 200; let projY = (b.y - 250) * scale + 250 + (100 - b.z)*1.5; let size = bSize * scale; ctx.fillRect(projX - size/2, projY - size/2, size, size); if(b.z < 10 && Math.abs(projX - pX) < size/2 + 15 && projY > 400 && projY < 450) { isOver = true; } }
            ctx.fillStyle = '#00d4ff'; ctx.beginPath(); ctx.moveTo(pX, 400); ctx.lineTo(pX - 20, 440); ctx.lineTo(pX + 20, 440); ctx.fill();

    // ==========================================
    // 6. 2048
    // ==========================================
    window.init2048 = function() {
        let size = window.getParam('2048', 'size'); let b = Array(size*size).fill(0); let score = 0; window.framesCount=0;
        const grid = document.getElementById('g2048-grid'); grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`; grid.innerHTML = ''; let cells = [];
        for(let i=0; i<size*size; i++) { let bg = document.createElement('div'); bg.style.background='#222'; bg.style.borderRadius='6px'; grid.appendChild(bg); let c = document.createElement('div'); c.className = 'g2048-cell'; c.style.width=`calc(100% / ${size} - 8px)`; c.style.height=`calc(100% / ${size} - 8px)`; cells.push(c); grid.appendChild(c); }

        function addTile() { let empty = []; b.forEach((v,i)=>{if(v===0) empty.push(i)}); if(empty.length>0) b[empty[Math.floor(Math.random()*empty.length)]] = Math.random()<0.9?2:4; }
        function draw() {
            window.framesCount++; window.broadcastData(score);
            for(let i=0; i<size*size; i++) {
                let v = b[i]; let c = cells[i]; let r = Math.floor(i/size), col = i%size;
                c.style.top = `calc(${r} * (100% / ${size}) + 4px)`; c.style.left = `calc(${col} * (100% / ${size}) + 4px)`;
                let color = '#222'; let tColor = '#fff';
                if(v===2) color='#eee4da', tColor='#000'; else if(v===4) color='#ede0c8', tColor='#000'; else if(v===8) color='#f2b179'; else if(v===16) color='#f59563'; else if(v===32) color='#f67c5f'; else if(v===64) color='#f65e3b'; else if(v>=128) color='#edcf72';
                c.style.background = v>0 ? color : 'transparent'; c.style.color = tColor; c.innerText = v>0 ? v : '';
            }
            document.getElementById('2048-score').innerText = score;
        }
        
        window.slide2048 = function(dir) {
            let moved = false;
            function op(row) { let arr = row.filter(v=>v!==0); for(let i=0; i<arr.length-1; i++) { if(arr[i]===arr[i+1]) { arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); arr.push(0); } } while(arr.length < size) arr.push(0); return arr; }
            if(dir==='left'||dir==='a'||dir==='ArrowLeft') { for(let r=0; r<size; r++) { let row=[]; for(let c=0; c<size; c++) row.push(b[r*size+c]); let newRow=op(row); for(let c=0; c<size; c++) { if(b[r*size+c]!==newRow[c]) moved=true; b[r*size+c]=newRow[c]; } } }
            if(dir==='right'||dir==='d'||dir==='ArrowRight') { for(let r=0; r<size; r++) { let row=[]; for(let c=0; c<size; c++) row.push(b[r*size+c]); row.reverse(); let newRow=op(row); newRow.reverse(); for(let c=0; c<size; c++) { if(b[r*size+c]!==newRow[c]) moved=true; b[r*size+c]=newRow[c]; } } }
            if(dir==='up'||dir==='w'||dir==='ArrowUp') { for(let c=0; c<size; c++) { let col=[]; for(let r=0; r<size; r++) col.push(b[r*size+c]); let newCol=op(col); for(let r=0; r<size; r++) { if(b[r*size+c]!==newCol[r]) moved=true; b[r*size+c]=newCol[r]; } } }
            if(dir==='down'||dir==='s'||dir==='ArrowDown') { for(let c=0; c<size; c++) { let col=[]; for(let r=0; r<size; r++) col.push(b[r*size+c]); col.reverse(); let newCol=op(col); newCol.reverse(); for(let r=0; r<size; r++) { if(b[r*size+c]!==newCol[r]) moved=true; b[r*size+c]=newCol[r]; } } }
            if(moved) { addTile(); draw(); }
        };
        addTile(); addTile(); draw();
    };

    // ==========================================
    // 7. Snake
    // ==========================================
    window.initSnake = function() {
        const cvs = document.getElementById('snake-canvas'); const ctx = cvs.getContext('2d');
        let speedInterval = window.getParam('snake', 'speed'); let fScore = window.getParam('snake', 'food'); let initLen = window.getParam('snake', 'init');
        const grid = 20; let snake = []; for(let i=0; i<initLen; i++) snake.push({x: 10-i, y: 10}); let food = {x: 15, y: 15}; window.sDx = 1; window.sDy = 0; let score = 0; window.framesCount=0;
        
        window.changeSnakeDir = function(dx, dy) { if(window.sDx === -dx || window.sDy === -dy) return; window.sDx = dx; window.sDy = dy; };
        
        function loop() {
            window.framesCount++; let head = { x: snake[0].x + window.sDx, y: snake[0].y + window.sDy };
            if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) return;
            snake.unshift(head); if(head.x === food.x && head.y === food.y) { score+=fScore; document.getElementById('snake-score').innerText = score; window.broadcastData(score); food = { x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20) }; } else { snake.pop(); }
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 400, 400); ctx.fillStyle = '#ff1744'; ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2); ctx.fillStyle = '#1db954'; snake.forEach(s => ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2));
            window.activeTimer = setTimeout(loop, speedInterval);
        }
        document.getElementById('snake-score').innerText = 0; window.activeTimer = setTimeout(loop, speedInterval);
    };

    // ==========================================

    window.initMine = function() {
        let w = window.getParam('mine','w'); let h = window.getParam('mine','h'); let mC = window.getParam('mine','c');
        const g = document.getElementById('mine-grid'); g.style.gridTemplateColumns = `repeat(${w}, 1fr)`; g.innerHTML=''; let f=mC; document.getElementById('mine-flags').innerText=f; let go=false; window.mineR=0; window.mineC=0; let s=new Set(), cells=[]; while(s.size<mC) s.add(Math.floor(Math.random()*w*h));
        for(let i=0;i<w*h;i++){let c=document.createElement('div');c.className='mine-cell';c.id=`m-cell-${i}`;c.onclick=()=>window.actionMineCursor('reveal',i);c.oncontextmenu=(e)=>{e.preventDefault();window.actionMineCursor('flag',i);};cells.push(c);g.appendChild(c);
            let count=0; if(!s.has(i)){let r=Math.floor(i/w), cc=i%w; for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc; if(nr>=0&&nr<h&&nc>=0&&nc<w&&s.has(nr*w+nc))count++;}}} c.dataset.count=count; c.dataset.mine=s.has(i);
        }
        window.moveMineCursor=function(dr,dc){if(go)return; document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.remove('focused'); window.mineR=Math.max(0,Math.min(h-1,window.mineR+dr)); window.mineC=Math.max(0,Math.min(w-1,window.mineC+dc)); document.getElementById(`m-cell-${window.mineR*w+window.mineC}`).classList.add('focused');};
        window.actionMineCursor=function(a,idx=null){if(go)return; let i=idx!==null?idx:(window.mineR*w+window.mineC); let c=cells[i]; if(a==='flag'){if(!c.classList.contains('revealed')){if(c.innerText==='🚩'){c.innerText='';f++;}else if(f>0){c.innerText='🚩';f--;} document.getElementById('mine-flags').innerText=f;}}else if(a==='reveal'){if(c.classList.contains('revealed')||c.innerText==='🚩')return; if(c.dataset.mine==='true'){c.innerText='💣';c.style.background='red';go=true;}else{c.classList.add('revealed');let cnt=parseInt(c.dataset.count);if(cnt>0){c.innerText=cnt;c.classList.add(`mine-c-${cnt}`);}if(cnt===0){let r=Math.floor(i/w),cc=i%w;for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=cc+dc;if(nr>=0&&nr<h&&nc>=0&&nc<w)window.actionMineCursor('reveal',nr*w+nc);}}}}}};
        document.getElementById(`m-cell-0`).classList.add('focused');
    };

    // ==========================================
    // 9. Breakout
    // ==========================================
    window.breakoutStartBall = function() { window.ballActive = true; };
    window.initBreakout = function() {
        const cvs = document.getElementById('breakout-canvas'); const ctx = cvs.getContext('2d');
        let s = window.getParam('breakout','bspeed'); let pW = window.getParam('breakout','width'); let pS = window.getParam('breakout','pspeed'); let rC = window.getParam('breakout','row'); let cC = window.getParam('breakout','col');
        let pX = 200, bX = 200, bY = 430, dx = s, dy = -s, score = 0, isOver = false; window.ballActive = false; window.framesCount=0;
        let bricks = []; let bW = 400/cC - 4; for(let r=0; r<rC; r++) { for(let c=0; c<cC; c++) { bricks.push({x: c*(bW+4)+2, y: r*20+30, w: bW, h: 15, status: 1}); } }
        function loop() {
            if(isOver) return; window.framesCount++;
            if(window.inputState.left && pX > pW/2) pX -= pS; if(window.inputState.right && pX < 400-pW/2) pX += pS;
            if(!window.ballActive) { bX = pX; bY = 430; } else { bX += dx; bY += dy; if(bX < 5 || bX > 395) dx = -dx; if(bY < 5) dy = -dy; if(bY > 440 && bY < 450 && bX > pX - pW/2 && bX < pX + pW/2) { dy = -dy; dx = ((bX - pX) / (pW/2)) * s; } else if(bY > 500) { isOver = true; } }
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 400, 500);
            bricks.forEach(b => { if(b.status === 1) { if(bX > b.x && bX < b.x+b.w && bY > b.y && bY < b.y+b.h) { dy = -dy; b.status = 0; score+=10; document.getElementById('breakout-score').innerText = score; window.broadcastData(score); } else { ctx.fillStyle = '#b000ff'; ctx.fillRect(b.x, b.y, b.w, b.h); } }});
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bX, bY, 5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#00d4ff'; ctx.fillRect(pX - pW/2, 440, pW, 10);

    };

        const cvs = document.getElementById('flappy-canvas'); const ctx = cvs.getContext('2d');
        let g = window.getParam('flappy','g')/100; let gap = window.getParam('flappy','gap'); let s = window.getParam('flappy','s');

        let es = window.getParam('shooter','es'); let er = window.getParam('shooter','er')/100; let ps = window.getParam('shooter','ps'); let bs = window.getParam('shooter','bs');
        window.shooterPx = 200; window.bullets = []; let enemies = [], score = 0, isOver = false; window.framesCount=0;
