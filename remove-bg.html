<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dogfish 的 AI 去背實驗室</title>
    <script>
        // 埋入第一個追蹤器，確認程式有活著
        console.log("🟢 系統檢查 1：網頁腳本已成功啟動！等待使用者操作...");

        const uploadInput = document.getElementById('upload');
        const originalImg = document.getElementById('original');
        const resultImg = document.getElementById('result');
        const statusText = document.getElementById('status');

        uploadInput.addEventListener('change', async (e) => {
            console.log("🟡 系統檢查 2：偵測到按鈕點擊，已取得圖片！");
            
            const file = e.target.files[0];
            if (!file) return;

            // 確保畫面一定會更新
            const objectURL = URL.createObjectURL(file);
            originalImg.src = objectURL;
            originalImg.style.display = 'block';
            resultImg.style.display = 'none';
            
            statusText.style.color = "#f39c12";
            statusText.innerText = '⏳ AI 正在思考中... (正在連線下載模型)';

            try {
                console.log("🔵 系統檢查 3：準備呼叫雲端 AI 模組...");
                
                // 【關鍵修改】改為使用者按下按鈕後，才去動態下載 AI 模組
                const module = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/dist/browser/imglyRemoveBackground.mjs');
                const imglyRemoveBackground = module.default;
                
                console.log("🟣 系統檢查 4：AI 模組下載成功！開始執行去背運算 (這可能需要 10~30 秒)...");

                const config = {
                    publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/dist/'
                };

                const imageBlob = await imglyRemoveBackground(file, config);
                const resultURL = URL.createObjectURL(imageBlob);

                resultImg.src = resultURL;
                resultImg.style.display = 'block';
                statusText.style.color = "#00ff00";
                statusText.innerText = '✅ 去背完成！你可以右鍵另存圖片。';
                console.log("🟢 系統檢查 5：去背大功告成！");
                
            } catch (error) {
                console.error("🔴 系統檢查：去背失敗，詳細原因抓到了 👇", error);
                statusText.style.color = "#ff4444";
                statusText.innerText = '❌ 發生錯誤，請看 Console 裡的紅字。';
            }
        });
    </script>
</head>
<body>

    <div>
        <a href="index.html" class="nav-btn">🏠 回到首頁</a>
    </div>

    <h1>✨ 瀏覽器端 AI 圖片去背</h1>
    <p>（所有運算皆在你的裝置上完成，不侵犯隱私！）</p>

    <label class="upload-btn">
        選擇圖片
        <input type="file" id="upload" accept="image/*">
    </label>

    <div id="status">等待上傳圖片...</div>

    <div class="image-container">
        <div class="image-box">
            <h3>原始圖片</h3>
            <img id="original" src="" style="display:none;">
        </div>
        <div class="image-box">
            <h3>去背結果</h3>
            <img id="result" src="" style="display:none;">
        </div>
    </div>
