<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dogfish 的 AI 去背實驗室</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        h1 { color: #00a8ff; }
        .nav-btn {
            background-color: #444;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .upload-btn {
            background-color: #00a8ff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            display: inline-block;
            margin-bottom: 20px;
        }
        input[type="file"] { display: none; }
        #status { color: #f39c12; font-weight: bold; font-size: 1.2em; margin-bottom: 20px;}
        
        .image-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
        }
        .image-box { max-width: 45%; min-width: 300px; }
        img {
            max-width: 100%;
            border-radius: 8px;
            border: 2px dashed #555;
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAADFJREFUOE9jZCASMDKgmHGIiYn5T4RmxoEhyoBRDYA2HkI2BqMmkMQmD1oOhmgA0joAAC+bEwkXl1/qAAAAAElFTkSuQmCC') repeat; 
        }
    </style>
</head>
<body>

    <div>
        <a href="index.html" class="nav-btn">🏠 回到首頁</a>
    </div>

    <h1>✨ 瀏覽器端 AI 圖片去背</h1>
    <p>（所有運算皆在你的裝置上完成，不侵犯隱私！）</p>

    <label class="upload-btn">
        選擇圖片
        <input type="file" id="upload" accept="image/*">
    </label>

    <div id="status">等待上傳圖片...</div>

    <div class="image-container">
        <div class="image-box">
            <h3>原始圖片</h3>
            <img id="original" src="" style="display:none;">
        </div>
        <div class="image-box">
            <h3>去背結果</h3>
            <img id="result" src="" style="display:none;">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("🟢 系統檢查 1：網頁元素載入完畢，腳本已啟動！");

            const uploadInput = document.getElementById('upload');
            const originalImg = document.getElementById('original');
            const resultImg = document.getElementById('result');
            const statusText = document.getElementById('status');

            uploadInput.addEventListener('change', async (e) => {
                console.log("🟡 系統檢查 2：偵測到按鈕點擊，已取得圖片！");
                
                const file = e.target.files[0];
                if (!file) return;

                const objectURL = URL.createObjectURL(file);
                originalImg.src = objectURL;
                originalImg.style.display = 'block';
                resultImg.style.display = 'none';
                
                statusText.style.color = "#f39c12";
                statusText.innerText = '⏳ AI 正在思考中... (初次載入大約需要幾十秒下載大腦模型，請耐心等候)';

                try {
                    console.log("🔵 系統檢查 3：準備呼叫雲端 AI 模組...");
                    
                    const module = await import('https://esm.sh/@imgly/background-removal@1.4.3');
                    const imglyRemoveBackground = module.default;
                    
                    console.log("🟣 系統檢查 4：AI 模組就緒！開始執行去背運算...");

                    // 【關鍵魔法】我們不給 config 了！讓套件自動去官方的 CDN 抓大腦模型！
                    const imageBlob = await imglyRemoveBackground(file);
                    const resultURL = URL.createObjectURL(imageBlob);

                    resultImg.src = resultURL;
                    resultImg.style.display = 'block';
                    statusText.style.color = "#00ff00";
                    statusText.innerText = '✅ 去背完成！你可以右鍵另存圖片。';
                    console.log("🟢 系統檢查 5：去背大功告成！");
                    
                } catch (error) {
                    console.error("🔴 系統檢查：去背失敗，詳細原因抓到了 👇", error);
                    statusText.style.color = "#ff4444";
                    statusText.innerText = '❌ 發生錯誤，請看 Console 裡的紅字。';
                }
            });
        });
    </script>

</body>
</html>
