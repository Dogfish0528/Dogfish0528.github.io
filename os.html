<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <title>Dogfish OS</title>

  <style>
    :root { --primary: #1db954; --secondary: #1ed760; --accent: #ff1744; --border-color: rgba(255, 255, 255, 0.1); --font-main: 'Noto Sans TC', sans-serif; --player-height: 90px; }
    body { background: linear-gradient(-45deg, #0a0a0a, #1a0b12, #0d141e, #0a110d); background-size: 400% 400%; animation: gradientBG 20s ease infinite; color: #ffffff; font-family: var(--font-main); margin: 0; padding: 0; overflow-x: hidden; transition: padding-bottom 0.3s ease; }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    a, button, input, select, textarea { cursor: pointer; }
    .solid-panel { background: rgba(20, 20, 20, 0.6); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .btn-action { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 800; transition: 0.2s; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3); } .btn-action:hover { background: var(--secondary); transform: scale(1.05); }
    .btn-del { background: rgba(255, 23, 68, 0.2); color: var(--accent); border: 1px solid var(--accent); padding: 6px 14px; border-radius: 20px; font-weight: 800; transition: 0.2s; } .btn-del:hover { background: var(--accent); color: white; }
    .btn-copy { background: transparent; color: #b3b3b3; border: 1px solid #555; padding: 6px 14px; border-radius: 20px; font-weight: 700; transition: 0.2s; text-decoration: none; display: inline-block; } .btn-copy:hover { color: white; border-color: white; }
    .btn-edit { background: rgba(29, 185, 84, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 6px 14px; border-radius: 20px; font-weight: 800; transition: 0.2s; } .btn-edit:hover { background: var(--primary); color: #000; }
    .btn-blue-dl { background: #0088ff; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; font-size: 1.05em; transition: 0.2s; display: inline-block; text-decoration: none; box-shadow: 0 4px 15px rgba(0,136,255,0.4); } .btn-blue-dl:hover { background: #00aaff; transform: translateY(-2px); }
    .input-box { background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; padding: 12px 16px; font-size: 1em; border-radius: 6px; outline: none; transition: 0.2s; box-sizing: border-box; } .input-box:focus { border-color: var(--primary); background: rgba(0,0,0,0.8); box-shadow: 0 0 10px rgba(29, 185, 84, 0.2); }
    
    /* 🌟 OS 核心樣式 🌟 */
    body.os-desktop-mode { overflow: hidden; margin: 0; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
    #os-taskbar { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; z-index: 9999; align-items: center; padding: 0 10px; user-select: none; }
    .taskbar-apps { display: flex; gap: 5px; flex: 1; height: 100%; align-items: center; padding: 0 10px; }
    .taskbar-btn { display: flex; align-items: center; gap: 5px; height: 36px; padding: 0 12px; border: none; color: white; font-weight: bold; font-size: 0.9em; cursor: pointer; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    
    .os-window { display: none; position: absolute; top: 50px; left: 50px; width: 80%; max-width: 1100px; height: 70vh; padding: 0 !important; overflow: hidden; z-index: 10; flex-direction: column; resize: both; }
    .os-window.active { display: flex; animation: windowOpen 0.2s ease-out; }
    @keyframes windowOpen { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .os-title-bar { display: flex; height: 35px; align-items: center; justify-content: space-between; padding-left: 15px; cursor: grab; user-select: none; flex-shrink: 0; }
    .os-title-bar:active { cursor: grabbing; }
    .os-window-title { font-weight: bold; font-size: 0.9em; display: flex; align-items: center; gap: 8px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .os-window-controls { display: flex; height: 100%; }
    .os-btn { width: 45px; height: 100%; border: none; background: transparent; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; font-size: 14px; transition: 0.1s; cursor: pointer; }
    .os-content-area { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
    
    /* 預設 Win11 主題 */
    body.theme-win11.os-desktop-mode { background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; }
    body.theme-win11 #os-taskbar { background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); justify-content: center; }
    body.theme-win11 .taskbar-apps { justify-content: center; }
    body.theme-win11 .taskbar-btn { background: transparent; border-radius: 6px; } body.theme-win11 .taskbar-btn:hover { background: rgba(255,255,255,0.1); } body.theme-win11 .taskbar-btn.active { background: rgba(255,255,255,0.15); box-shadow: inset 0 -3px 0 var(--primary); }
    body.theme-win11 #os-start-btn { background: transparent; color: white; border-radius: 6px; font-size: 1.2em; padding: 0 15px; border: none; transition: 0.2s; } body.theme-win11 #os-start-btn:hover { background: rgba(255,255,255,0.1); }
    body.theme-win11 .os-window { background: rgba(25, 25, 25, 0.85) !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
    body.theme-win11 .os-title-bar { background: transparent; } body.theme-win11 .os-window-title { color: #fff; } body.theme-win11 .os-btn { color: #fff; } body.theme-win11 .os-btn:hover { background: rgba(255,255,255,0.1); } body.theme-win11 .os-btn-close:hover { background: #e81123; color: white; border-top-right-radius: 11px; }

    /* WinXP 主題 */
    body.theme-winxp.os-desktop-mode { background: url('https://upload.wikimedia.org/wikipedia/en/2/27/Bliss_%28Windows_background%29.jpg') no-repeat center center fixed; background-size: cover; }
    body.theme-winxp #os-taskbar { background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #333 100%); border-top: none; justify-content: flex-start; padding: 0; box-shadow: 0 -2px 5px rgba(0,0,0,0.5); }
    body.theme-winxp .taskbar-apps { justify-content: flex-start; padding-left: 5px; }

    body.theme-winxp #os-start-btn { background: linear-gradient(to bottom, #499e3a 0%, #388629 100%); color: white; font-style: italic; font-weight: bold; border: none; border-radius: 0 15px 15px 0; height: 100%; padding: 0 25px 0 15px; box-shadow: inset 0 1px 2px rgba(255,255,255,0.6), 2px 0 5px rgba(0,0,0,0.5); text-shadow: 1px 1px 2px rgba(0,0,0,0.7); font-size: 1.1em; }
    body.theme-winxp .os-window { background: #ece9d8 !important; border: 3px solid #0055e5; border-radius: 8px 8px 0 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: none; }
    body.theme-winxp .os-title-bar { background: linear-gradient(to right, #0058e6 0%, #3a93ff 100%); border-radius: 4px 4px 0 0; padding-left: 8px; height: 30px; } body.theme-winxp .os-window-title { color: #fff; font-family: 'Tahoma', sans-serif; }
    body.theme-winxp .os-content-area { background: #fff; border: 1px solid #0055e5; border-top: none; color: #000; } body.theme-winxp .os-content-area h1, body.theme-winxp .os-content-area h2, body.theme-winxp .os-content-area h3 { color: #003399; text-shadow: none; }
    body.theme-winxp .solid-panel { background: #f3f3f3; border: 1px solid #ccc; color: #333; box-shadow: none; }
    body.theme-winxp .os-btn { width: 22px; height: 22px; margin: 3px 2px; border-radius: 3px; border: 1px solid white; background: linear-gradient(to bottom, #fff 0%, #d8d8d8 100%); color: #000; box-shadow: 1px 1px 2px rgba(0,0,0,0.3); font-weight: bold; } body.theme-winxp .os-btn-close { background: linear-gradient(to bottom, #f37d73 0%, #e53c2f 100%); color: white; border-color: #fff; }

    /* Win98 主題 */
    body.theme-win98.os-desktop-mode { background: #008080; }
    body.theme-win98 #os-taskbar { background: #c0c0c0; border-top: 2px solid #fff; box-shadow: inset 0 1px 0 #dfdfdf; justify-content: flex-start; padding: 2px; height: 35px; }
    body.theme-win98 .taskbar-apps { justify-content: flex-start; padding-left: 5px; }
    body.theme-win98 .taskbar-btn { background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; color: black; border-radius: 0; margin-right: 2px; height: 28px; } body.theme-win98 .taskbar-btn.active { border-color: #808080 #fff #fff #808080; background: #dfdfdf; font-weight: bold; }
    body.theme-win98 #os-start-btn { background: #c0c0c0; color: black; font-weight: bold; border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 0 10px; height: 28px; display: flex; align-items: center; } body.theme-win98 #os-start-btn:active { border-color: #808080 #fff #fff #808080; }
    body.theme-win98 .os-window { background: #c0c0c0 !important; border: 2px solid; border-color: #fff #000 #000 #fff; border-radius: 0; box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080; backdrop-filter: none; padding: 2px !important; }
    body.theme-win98 .os-title-bar { background: #000080; padding-left: 4px; height: 22px; justify-content: space-between; margin: 2px; } body.theme-win98 .os-window-title { color: #fff; font-family: 'MS Sans Serif', sans-serif; font-weight: bold; }
    body.theme-win98 .os-content-area { background: #fff; border: 2px solid; border-color: #808080 #fff #fff #808080; color: #000; margin: 2px; padding: 15px; } body.theme-win98 .os-content-area h1, body.theme-win98 .os-content-area h2, body.theme-win98 .os-content-area h3 { color: #000; text-shadow: none; }
    body.theme-win98 .solid-panel { background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; color: black; box-shadow: none; }
    body.theme-win98 .os-window-controls { gap: 2px; padding: 2px; } body.theme-win98 .os-btn { width: 16px; height: 16px; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; color: black; font-weight: bold; font-size: 10px; padding: 0; } body.theme-win98 .os-btn:active { border-color: #808080 #fff #fff #808080; }

    /* 其他共用組件 (播放器、文章等) 與 index.html 相同 */
    .material-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .material-item { background: rgba(20,20,20,0.5); border: 1px solid var(--border-color); padding: 16px; border-radius: 12px; transition: 0.3s; display: flex; flex-direction: column; gap: 12px; position: relative; overflow: hidden; backdrop-filter: blur(5px); } .material-item:hover { background: rgba(30,30,30,0.8); box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(-3px); border-color: #444; }
    .folder-header { grid-column: 1 / -1; font-size: 1.4em; font-weight: 900; color: white; margin-top: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 8px; text-align: left; }
    .album-art-wrapper { width: 100%; aspect-ratio: 1/1; border-radius: 8px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.4); } .album-art-img { width: 100%; height: 100%; object-fit: cover; }
    .sfx-push-btn { width: 110px; height: 120px; border-radius: 50%; background-size: cover; background-position: center; border: 4px solid #fff; margin: 0 auto 15px; display: block; transition: 0.1s; box-shadow: 0 8px 0 #111, 0 15px 20px rgba(0,0,0,0.5); } .sfx-push-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #111, 0 5px 10px rgba(0,0,0,0.5); }
    .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; } .article-card { background: rgba(20,20,20,0.5); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid var(--border-color); text-align: left; backdrop-filter: blur(5px); position: relative; } .article-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(29, 185, 84, 0.2); } .article-info { padding: 20px; } .article-title { font-size: 1.5em; font-weight: 900; margin: 0 0 10px; color: white; }
    .chat-app { display: flex; height: 100%; min-height: 400px; background: rgba(30,30,30,0.7); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; backdrop-filter: blur(10px); } .chat-sidebar { width: 280px; background: rgba(20,20,20,0.8); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; text-align: left; flex-grow: 1; min-width: 250px; } .chat-list { flex: 1; overflow-y: auto; } .chat-list-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px; transition: 0.2s; cursor: pointer; } .chat-list-item:hover, .chat-list-item.active { background: rgba(29, 185, 84, 0.2); border-left: 4px solid var(--primary); } .chat-list-avatar { width: 40px; height: 40px; border-radius: 50%; background: #555; object-fit: cover; } .chat-main { flex: 2; display: flex; flex-direction: column; background: rgba(116, 155, 182, 0.2); min-width: 300px; position: relative; } .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; } .chat-row { display: flex; gap: 10px; max-width: 85%; text-align: left; } .chat-row.me { align-self: flex-end; flex-direction: row-reverse; } .chat-row.other { align-self: flex-start; } .chat-bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.95em; line-height: 1.4; word-break: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.2); } .chat-row.me .chat-bubble { background: #85e04f; color: #000; border-top-right-radius: 4px; } .chat-row.other .chat-bubble { background: rgba(255,255,255,0.9); color: #000; border-top-left-radius: 4px; } .chat-input-area { background: rgba(0,0,0,0.5); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); } .chat-input { flex: 1; padding: 12px 15px; border: none; border-radius: 20px; outline: none; font-size: 1em; background: rgba(255,255,255,0.9); color: #000; }
    .spotify-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 2.5vh 2.5vw; } .modal-content { background: rgba(20,20,20,0.95); border-radius: 16px; width: 100%; max-width: 1600px; height: 100%; max-height: 95vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border: 1px solid #333; overflow: hidden; } .modal-header { padding: 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; background: rgba(15,15,15,0.95); flex-shrink: 0; z-index: 10; } .modal-header h2, .modal-header h1 { margin: 0; color: var(--primary); } .modal-close-btn { font-size: 2.5em; color: #b3b3b3; cursor: pointer; transition: 0.2s; line-height: 0.8; } .modal-close-btn:hover { color: white; transform: rotate(90deg); } .modal-body { flex: 1; overflow-y: auto; padding: 30px; scroll-behavior: smooth; } .modal-footer { padding: 20px 30px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(15,15,15,0.95); flex-shrink: 0; z-index: 10; display: flex; justify-content: center; }
    .rich-editor-content { background: rgba(0,0,0,0.3); min-height: 40vh; border: 1px solid #333; border-radius: 0 0 8px 8px; padding: 20px; color: white; line-height: 1.8; outline: none; } .rich-editor-content img, .rich-editor-content iframe, .rich-editor-content video { max-width: 100%; border-radius: 8px; margin: 15px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; transition: outline 0.2s; }
    #toast-container { position: fixed; top: 80px; right: 30px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; } .toast { background: rgba(30,30,30,0.9); color: white; padding: 15px 25px; border-radius: 8px; border-left: 5px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-weight: 700; font-size: 1.1em; backdrop-filter: blur(10px); animation: slideIn 0.3s forwards, fadeOut 0.3s forwards 4.7s; } .toast.error { border-left-color: var(--accent); } @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } } @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }
  </style>
</head>
